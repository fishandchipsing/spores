// ── Shake button ─────────────────────────────────────────────────
document.getElementById('shake-btn').addEventListener('click', () => {
  if (!S.running || !ctx) return;
  const btn = document.getElementById('shake-btn');
  btn.classList.remove('shaking');
  void btn.offsetWidth; // reflow to restart animation
  btn.classList.add('shaking');
  setTimeout(() => btn.classList.remove('shaking'), 500);

  // 1. LFO spike — sudden turbulence in the ambient layer
  if (lfoGain) {
    const base = WORLDS[S.world].ambient.lfo.depth;
    lfoGain.gain.cancelScheduledValues(ctx.currentTime);
    lfoGain.gain.setValueAtTime(base * 6, ctx.currentTime);
    lfoGain.gain.setTargetAtTime(base, ctx.currentTime + 0.1, 1.8);
  }

  // 2. ambGain pulse — brief volume thump
  if (ambGain) {
    ambGain.gain.cancelScheduledValues(ctx.currentTime);
    ambGain.gain.setValueAtTime(ambGain.gain.value * 2.2, ctx.currentTime);
    ambGain.gain.setTargetAtTime(0.55, ctx.currentTime + 0.05, 1.2);
  }

  // 3. Immediate pad note — the shake colours the harmony
  playPad(S.world);

  // 4. Reactive melody burst — conflict level (guaranteed, no 45% skip)
  const m = MELODY_CFG[S.world];
  if (m && ctx && masterGain) {
    const fl = m.freqs.length;
    const center = Math.round(VIBE.register * (fl - 1));
    const numNotes = 2 + Math.floor(Math.random() * 2);
    let idx = Math.max(0, Math.min(fl - 1, center + Math.round((Math.random() - 0.5) * 2)));
    for (let i = 0; i < numNotes; i++) {
      const freq = m.freqs[Math.max(0, Math.min(fl - 1, idx))];
      const delay = i * (280 + Math.random() * 120);
      const rel = (i === numNotes - 1) ? (m.relLong ?? 2.5) : (m.relShort ?? 0.4);
      setTimeout(() => { if (S.running) playNote(S.world, freq, rel); }, delay);
      const dir = Math.random() < 0.5 ? 1 : -1;
      idx = Math.max(0, Math.min(fl - 1, idx + dir * (1 + Math.floor(Math.random() * 2))));
    }
  }

  // 5. VIBE jolt + instant pad brightness spike
  VIBE.activity = Math.min(1, VIBE.activity + 0.4);
  VIBE.tension  = Math.min(1, VIBE.tension  + 0.35);
  updatePadTone(0.4);

  // 6. Play a random cached sound from current world — less muffled than ghost layer
  if (GHOST.files.length > 0 && ctx) {
    const file = GHOST.files[Math.floor(Math.random() * GHOST.files.length)];
    fetch(`/sfx-cache/${encodeURIComponent(file)}`)
      .then(r => r.ok ? r.arrayBuffer() : null)
      .then(ab => ab ? ctx.decodeAudioData(ab) : null)
      .then(buf => {
        if (!buf || !S.running) return;
        const src = ctx.createBufferSource(); src.buffer = buf;
        const lpf = ctx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=900+Math.random()*500; lpf.Q.value=0.5;
        const pan = ctx.createStereoPanner(); pan.pan.value=(Math.random()-0.5)*0.9;
        const gain = ctx.createGain(); gain.gain.value=0;
        src.connect(lpf); lpf.connect(pan); pan.connect(gain);
        gain.connect(sfxGain||masterGain||ctx.destination);
        const now = ctx.currentTime;
        gain.gain.setTargetAtTime(0.62, now, 0.08);
        gain.gain.setTargetAtTime(0, now + buf.duration - 1.0, 0.8);
        src.start(); src.stop(now + buf.duration + 0.2);
        // Show label from filename
        const slug = file.replace(/^[^-]+-/, '').replace(/-\d+\.mp3$/, '').replace(/_/g, ' ');
        showSFXLabel(slug || file, 'all around');
        addSoundEntry(file, 'all around', 'shake');
      }).catch(() => {});
  }
});

// ═══════════════════════════════════════════════════════════
// SIDE PANEL
// ═══════════════════════════════════════════════════════════
let panelOpen = true;

function panelApplyState() {
  document.getElementById('side-panel').classList.toggle('closed', !panelOpen);
  const tog = document.getElementById('panel-toggle');
  tog.classList.toggle('closed', !panelOpen);
  tog.textContent = panelOpen ? '▸' : '◂';
  if (panelOpen) tog.style.right = '320px';
  else           tog.style.right = '0px';
}
document.getElementById('panel-toggle').addEventListener('click', () => {
  panelOpen = !panelOpen;
  panelApplyState();
});
panelApplyState();

function updatePanelState() {
  const el = id => document.getElementById(id);
  el('ps-world').textContent   = S.world   || '—';
  el('ps-weather').textContent = S.weather || '—';
  el('ps-time').textContent    = S.timeOfDay || '—';
  el('ps-events').textContent  = S.eventCount || 0;
}

// Vibe bars update on a smooth interval
setInterval(() => {
  const set = (barId, valId, v) => {
    const bar = document.getElementById(barId);
    const val = document.getElementById(valId);
    if (bar) bar.style.width = (v * 100).toFixed(1) + '%';
    if (val) val.textContent  = v.toFixed(2);
  };
  set('vb-activity', 'vv-activity', VIBE.activity);
  set('vb-tension',  'vv-tension',  VIBE.tension);
  set('vb-register', 'vv-register', VIBE.register);
}, 400);

function updatePanelAgents() {
  const list = document.getElementById('pa-list');
  if (!list || !S.world) return;
  const agents = WORLDS[S.world]?.agents || [];
  list.innerHTML = agents.map(a => {
    const state = S.agentStates[a.id] || a.state || '—';
    return `<div class="pa-row" id="par-${a.id}">
      <span class="pa-name">${a.label}</span>
      <span class="pa-state">${state}</span>
    </div>`;
  }).join('');
}

function flashPanelAgent(agentLabel) {
  if (!agentLabel || !S.world) return;
  const agents = WORLDS[S.world]?.agents || [];
  const a = agents.find(a => a.label.toLowerCase() === agentLabel.toLowerCase());
  if (!a) return;
  const row = document.getElementById('par-' + a.id);
  if (!row) return;
  row.classList.add('lit');
  setTimeout(() => row.classList.remove('lit'), 2500);
}

function addPanelEntry(rawPrompt, rawResponse, ev) {
  const list = document.getElementById('pl-list');
  if (!list) return;

  const time  = new Date().toTimeString().slice(0, 5);
  const type  = ev.type || 'moment';
  const agent = ev.agent || '';
  const desc  = ev.description || '';

  // Sounds summary
  let soundsHtml = '';
  if (ev.sounds && ev.sounds.length) {
    const lines = ev.sounds.map(s =>
      `<span style="opacity:0.45">${(s.delay||0)/1000}s</span> ${s.prompt}`
    ).join('<br>');
    soundsHtml = `<div class="pl-sounds">${lines}</div>`;
  }

  // Unique id for expand targets
  const uid = 'ple' + Date.now();

  const entry = document.createElement('div');
  entry.className = 'pl-entry';
  entry.innerHTML = `
    <div class="pl-header">
      <span class="pl-time">${time}</span>
      <span class="pl-type ${type}">${type}</span>
      <span class="pl-agent">${agent}</span>
    </div>
    <div class="pl-desc">${desc}</div>
    ${soundsHtml}
    <div>
      <button class="pl-expand" onclick="toggleDetail('${uid}-p')">prompt ▾</button>
      <button class="pl-expand" onclick="toggleDetail('${uid}-r')">response ▾</button>
    </div>
    <div class="pl-detail" id="${uid}-p">${escHtml(rawPrompt)}</div>
    <div class="pl-detail" id="${uid}-r">${escHtml(rawResponse)}</div>
  `;
  list.prepend(entry);

  // Prune to last 20 entries
  const entries = list.querySelectorAll('.pl-entry');
  if (entries.length > 20) entries[entries.length - 1].remove();

  // Flash the agent row
  flashPanelAgent(agent);
}

function toggleDetail(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Sound entries ──────────────────────────────────────────
const DIR_ARROW = { left:'←', right:'→', ahead:'↑', behind:'↓', above:'↑', 'all around':'·' };

function filenameToLabel(f) {
  // New format: world-slug-timestamp.mp3  e.g. water-heron_strikes_at_fish-1716400000000.mp3
  // Remove world prefix, remove trailing -timestamp, convert underscores to spaces
  return f.replace(/^[^-]+-/, '').replace(/-\d{10,}\.mp3$/, '').replace(/\.mp3$/, '').replace(/_/g, ' ');
}

function addSoundEntry(text, direction, kind) {
  const list = document.getElementById('ps-list');
  if (!list) return;

  const time = new Date().toTimeString().slice(0, 5);
  const arrow = direction ? (DIR_ARROW[direction] ?? '·') : '↩';
  const isFilename = kind === 'ghost' || kind === 'shake';
  const label = isFilename ? filenameToLabel(text) : text;

  const entry = document.createElement('div');
  entry.className = 'sound-entry';
  entry.innerHTML =
    `<span class="se-time">${time}</span>` +
    `<span class="se-kind ${kind}">${kind}</span>` +
    `<span class="se-dir">${arrow}</span>` +
    `<span class="se-text">${escHtml(label)}</span>`;
  list.prepend(entry);

  // Fade older entries, prune beyond 12
  const all = list.querySelectorAll('.sound-entry');
  all.forEach((el, i) => { if (i >= 3) el.classList.add('fading'); });
  if (all.length > 12) all[all.length - 1].remove();
}

function updateCacheCount() {
  const el = document.getElementById('ps-cache-count');
  if (!el) return;
  const total = GHOST.files.length;
  const world = GHOST.files.filter(f => f.startsWith(S.world)).length;
  el.textContent = `cache: ${world} this · ${total} total`;
}

// Refresh cache count whenever ghostFetch runs
const _origGhostFetch = ghostFetch;
ghostFetch = async function() {
  await _origGhostFetch();
  updateCacheCount();
};

// Initial panel render (world already selected at load)
updatePanelState();
updatePanelAgents();
ghostFetch(); // populate cache count on load
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ambient world</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a08; --dim: #1a1a16; --muted: #38382f;
    --text: #7a7a6e; --accent: #c4c4aa; --event: #e4e4cc;
  }
  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: 'IBM Plex Mono', monospace; font-weight: 300;
    font-size: 13px; line-height: 1.7; overflow: hidden;
    cursor: default; user-select: none;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 0;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  }

  /* ── World selector ───────────────────────────────────────── */
  #world-selector {
    display: flex; gap: 24px; margin-bottom: 20px;
  }
  .world-btn {
    background: none; border: none; color: var(--muted);
    font-family: inherit; font-size: 10px; font-weight: 300;
    letter-spacing: 0.14em; text-transform: uppercase;
    cursor: pointer; padding: 0; transition: color 0.5s; position: relative;
  }
  .world-btn::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 0; height: 1px; background: var(--accent); transition: width 0.4s; }
  .world-btn.active { color: var(--accent); }
  .world-btn.active::after { width: 100%; }
  .world-btn:hover { color: var(--text); }

  /* ── Radio pill ───────────────────────────────────────────── */
  #radio {
    display: flex; align-items: center;
    background: #111110;
    border: 1px solid #222220;
    border-radius: 52px;
    width: 580px; height: 90px;
    overflow: hidden;
    box-shadow: 0 4px 32px rgba(0,0,0,0.55);
    flex-shrink: 0;
  }

  /* ── Circle canvas ─────────────────────────────────────────── */
  #radio-circle {
    width: 90px; height: 90px;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
    border-radius: 50%;
    background: #0a0a08;
  }
  #radio-circle::after {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    box-shadow: inset 0 0 16px rgba(0,0,0,0.6);
    pointer-events: none; z-index: 2;
  }
  #world-canvas { position: absolute; top: 0; left: 0; }

  /* ── Ticker ───────────────────────────────────────────────── */
  #radio-ticker {
    flex: 1;
    overflow: hidden;
    padding: 0 18px;
    height: 100%;
    display: flex; align-items: center;
    border-left: 1px solid #1c1c18;
    min-width: 0;
  }
  .ticker-mask { overflow: hidden; width: 100%; }
  #ticker-text {
    display: inline-block;
    font-size: 10px; letter-spacing: 0.13em; text-transform: uppercase;
    color: var(--accent); white-space: nowrap;
    transform: translateX(0);
  }
  #ticker-text.running {
    animation: ticker-scroll var(--ticker-dur, 18s) linear 0.4s 1 forwards;
  }
  @keyframes ticker-scroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(var(--ticker-shift, -60%)); }
  }

  /* ── Right controls ────────────────────────────────────────── */
  #radio-right {
    display: flex; align-items: center; gap: 10px;
    padding: 0 18px;
    height: 100%;
    border-left: 1px solid #1c1c18;
    flex-shrink: 0;
  }

  /* Animated bars */
  #radio-bars { display: flex; align-items: flex-end; gap: 2px; height: 20px; }
  .rbar {
    width: 2.5px; background: var(--muted); border-radius: 1px;
    height: 3px;
    transition: height 0.2s;
  }
  #radio-bars.live .rbar:nth-child(1) { animation: rb1 0.85s ease-in-out infinite alternate; }
  #radio-bars.live .rbar:nth-child(2) { animation: rb2 0.65s ease-in-out infinite alternate; }
  #radio-bars.live .rbar:nth-child(3) { animation: rb3 0.95s ease-in-out infinite alternate; }
  #radio-bars.live .rbar:nth-child(4) { animation: rb4 0.75s ease-in-out infinite alternate; }
  #radio-bars.live .rbar:nth-child(5) { animation: rb5 1.05s ease-in-out infinite alternate; }
  @keyframes rb1 { to { height: 14px; } } @keyframes rb2 { to { height: 19px; } }
  @keyframes rb3 { to { height: 10px; } } @keyframes rb4 { to { height: 17px; } }
  @keyframes rb5 { to { height: 8px;  } }

  /* Vol */
  .knob-label { font-size: 8px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
  #vol-slider {
    -webkit-appearance: none; appearance: none;
    width: 55px; height: 2px; background: var(--dim);
    outline: none; border: none; cursor: pointer;
    border-radius: 1px;
  }
  #vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 8px; height: 8px;
    border-radius: 50%; background: var(--accent); cursor: pointer;
  }

  /* Start/stop button */
  #start-btn {
    width: 26px; height: 26px;
    background: var(--muted); border: none; border-radius: 4px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--bg); font-size: 9px; font-family: inherit;
    transition: background 0.3s;
    flex-shrink: 0;
  }
  #start-btn.on { background: var(--accent); }
  #shake-btn {
    width: 26px; height: 26px;
    background: transparent; border: 1px solid var(--muted); border-radius: 4px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 11px; font-family: inherit;
    transition: color 0.2s, border-color 0.2s;
    flex-shrink: 0;
  }
  #shake-btn:hover { color: var(--accent); border-color: var(--accent); }
  #shake-btn.shaking { animation: shake-anim 0.45s ease-out; }
  @keyframes shake-anim {
    0%  { transform: translateX(0); }
    15% { transform: translateX(-4px) rotate(-2deg); }
    30% { transform: translateX(4px)  rotate(2deg); }
    45% { transform: translateX(-3px) rotate(-1deg); }
    60% { transform: translateX(3px); }
    75% { transform: translateX(-2px); }
    100%{ transform: translateX(0); }
  }

  /* ── Meta strip below pill ─────────────────────────────────── */
  #sfx-display {
    margin-top: 8px;
    height: 14px;
    font-size: 9px; letter-spacing: 0.06em;
    color: var(--text);
    display: flex; align-items: center; gap: 7px;
    opacity: 0; transition: opacity 0.25s ease;
    pointer-events: none;
    max-width: 580px; overflow: hidden;
  }
  #sfx-display.visible { opacity: 1; }
  .sfx-dir {
    color: var(--muted); font-size: 8px; flex-shrink: 0;
  }
  #sfx-prompt {
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  #meta {
    margin-top: 8px;
    font-size: 9px; color: var(--muted); letter-spacing: 0.08em;
    display: flex; gap: 12px; align-items: center;
  }
  #meta .hl { color: var(--text); }
  #meta .sep { opacity: 0.3; }

  /* ── Secondary controls (hidden by default, toggle-able) ───── */
  #secondary {
    margin-top: 12px;
    display: none;
    gap: 20px; align-items: center;
    font-size: 9px; color: var(--muted);
  }
  #secondary.open { display: flex; }
  .sc-wrap { display: flex; align-items: center; gap: 6px; }
  .sc-slider {
    -webkit-appearance: none; appearance: none;
    width: 60px; height: 2px; background: var(--dim); outline: none; border: none;
    cursor: pointer; border-radius: 1px;
  }
  .sc-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 7px; height: 7px;
    border-radius: 50%; background: var(--text); cursor: pointer;
  }
  /* ── Mix controls ─────────────────────────────────────────── */
  #mix {
    margin-top: 14px;
    display: flex; gap: 22px; align-items: center;
  }
  .mix-row { display: flex; align-items: center; gap: 7px; }
  .mix-label {
    font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); width: 38px;
  }
  .mix-slider {
    -webkit-appearance: none; appearance: none;
    width: 72px; height: 2px; background: var(--dim); outline: none; border: none;
    cursor: pointer; border-radius: 1px;
  }
  .mix-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 8px; height: 8px;
    border-radius: 50%; background: var(--text); cursor: pointer;
  }

  #settings-toggle {
    margin-top: 10px; background: none; border: none; cursor: pointer;
    color: var(--muted); font-family: inherit; font-size: 9px;
    letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.45;
    transition: opacity 0.3s;
  }
  #settings-toggle:hover { opacity: 0.75; }

  /* ── Debug overlay ─────────────────────────────────────────── */
  #debug-overlay {
    position: fixed; top: 12px; right: 12px;
    font-size: 9px; color: var(--muted); line-height: 1.8;
    pointer-events: none; z-index: 100;
    display: flex; flex-direction: column; align-items: flex-end; gap: 0;
  }
  .dk { opacity: 0.4; margin-right: 6px; }
  .dv { color: var(--text); opacity: 0.25; transition: opacity 0.5s; }

  /* hidden utility elements */
  #event-log, #agents-strip, #pulse { display: none; }

  /* ── Side panel ───────────────────────────────────────────── */
  #panel-toggle {
    position: fixed; top: 50%; right: 320px;
    transform: translateY(-50%);
    width: 18px; height: 44px;
    background: #0f0f0d; border: 1px solid #1e1e1a; border-right: none;
    border-radius: 4px 0 0 4px;
    cursor: pointer; z-index: 201;
    color: var(--muted); font-size: 8px; font-family: inherit;
    display: flex; align-items: center; justify-content: center;
    transition: right 0.3s ease, color 0.2s;
  }
  #panel-toggle:hover { color: var(--accent); }
  #panel-toggle.closed { right: 0; }

  #side-panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 320px;
    background: #111110;
    border-left: 1px solid #252520;
    display: flex; flex-direction: column;
    z-index: 200;
    transform: translateX(0);
    transition: transform 0.3s ease;
    overflow: hidden;
    /* panel-local palette — brighter than the ambient UI */
    --p-dim:    #4e4e46;
    --p-mid:    #7e7e72;
    --p-text:   #b8b8a8;
    --p-bright: #deded0;
    --p-accent: #c8c8b0;
    --p-sep:    #1e1e1c;
  }
  #side-panel.closed { transform: translateX(320px); }

  .panel-section {
    border-bottom: 1px solid var(--p-sep);
    padding: 12px 14px;
    flex-shrink: 0;
  }
  .panel-head {
    font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--p-dim); margin-bottom: 9px;
  }
  .panel-kv {
    display: flex; gap: 8px; margin-bottom: 4px; align-items: baseline;
  }
  .panel-k {
    font-size: 9px; color: var(--p-mid);
    min-width: 54px; flex-shrink: 0;
  }
  .panel-v {
    font-size: 9px; color: var(--p-bright); letter-spacing: 0.03em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* vibe bars */
  .vibe-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .vk { font-size: 9px; color: var(--p-mid); min-width: 54px; }
  .vbar-wrap { flex: 1; height: 2px; background: #252520; border-radius: 1px; overflow: hidden; }
  .vbar { height: 100%; background: var(--p-text); border-radius: 1px; width: 0%; transition: width 0.6s ease; }
  .vv { font-size: 9px; color: var(--p-text); min-width: 30px; text-align: right; }

  /* agents list */
  #panel-agents { max-height: 160px; overflow-y: auto; }
  #panel-agents::-webkit-scrollbar { width: 2px; }
  #panel-agents::-webkit-scrollbar-thumb { background: var(--p-dim); }
  .pa-row {
    display: flex; gap: 10px; margin-bottom: 5px; align-items: baseline;
    font-size: 9px; line-height: 1.55;
  }
  .pa-name { color: var(--p-accent); min-width: 72px; flex-shrink: 0; }
  .pa-state { color: var(--p-mid); overflow: hidden; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .pa-row.lit .pa-name { color: #e8e8d0; }
  .pa-row.lit .pa-state { color: var(--p-text); }

  /* log */
  #panel-log { flex: 1; overflow-y: auto; min-height: 0; }
  #panel-log::-webkit-scrollbar { width: 2px; }
  #panel-log::-webkit-scrollbar-thumb { background: var(--p-dim); }
  #pl-list { padding: 0 14px 12px; }

  .pl-entry {
    border-bottom: 1px solid var(--p-sep);
    padding: 10px 0 8px;
    font-size: 10px; line-height: 1.6;
  }
  .pl-entry:last-child { border-bottom: none; }
  .pl-header { display: flex; gap: 8px; align-items: center; margin-bottom: 5px; flex-wrap: wrap; }
  .pl-time { color: var(--p-dim); font-size: 9px; }
  .pl-type {
    font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase;
    padding: 1px 6px; border-radius: 2px;
  }
  .pl-type.moment      { background: #1e2818; color: #96c870; }
  .pl-type.conflict    { background: #281818; color: #c87070; }
  .pl-type.interaction { background: #181e28; color: #7096c8; }
  .pl-type.shift       { background: #26261a; color: #c8c870; }
  .pl-type.passing     { background: #1e1e1e; color: #888888; }
  .pl-type.distant     { background: #1a1a1a; color: #666666; }
  .pl-type.residue     { background: #1e1828; color: #9070c8; }
  .pl-agent { color: var(--p-accent); font-size: 10px; font-weight: 400; }
  .pl-desc { color: var(--p-bright); margin-bottom: 6px; line-height: 1.6; }
  .pl-sounds { color: var(--p-mid); font-style: italic; margin-bottom: 6px; font-size: 9px; line-height: 1.55; }

  .pl-expand {
    background: none; border: none; cursor: pointer;
    font-family: inherit; font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--p-mid); padding: 0; margin-right: 12px;
    transition: color 0.15s;
  }
  .pl-expand:hover { color: var(--p-bright); }
  .pl-detail {
    display: none; margin-top: 7px;
    background: #0d0d0c; border: 1px solid #1e1e1c;
    border-radius: 3px; padding: 9px;
    color: var(--p-mid); font-size: 8.5px; line-height: 1.7;
    white-space: pre-wrap; word-break: break-word;
    max-height: 240px; overflow-y: auto;
  }
  .pl-detail.open { display: block; }
  .pl-detail::-webkit-scrollbar { width: 2px; }
  .pl-detail::-webkit-scrollbar-thumb { background: var(--p-dim); }


  /* arc panel */
  .arc-epoch-label { font-size:8px; color:var(--p-dim); letter-spacing:0.06em; }
  .arc-title {
    font-size:11px; color:var(--p-bright); letter-spacing:0.02em;
    margin-bottom:5px; line-height:1.4;
  }
  .arc-title.generating { color:var(--p-dim); font-style:italic; }
  .arc-logline {
    font-size:9px; color:var(--p-mid); font-style:italic;
    line-height:1.55; margin-bottom:9px;
  }
  .arc-dots { display:flex; gap:5px; align-items:center; margin-bottom:6px; }
  .arc-dot {
    width:6px; height:6px; border-radius:50%; flex-shrink:0;
    background:var(--p-sep); transition:background 0.4s;
  }
  .arc-dot.done   { background:var(--p-mid); }
  .arc-dot.active { background:var(--p-bright); box-shadow:0 0 4px var(--p-bright); }
  .arc-beat-desc {
    font-size:8.5px; color:var(--p-text); line-height:1.55;
    padding-left:2px;
  }
  .arc-epoch-progress {
    margin-top:8px; height:2px; background:var(--p-sep); border-radius:1px; overflow:hidden;
  }
  .arc-epoch-bar {
    height:100%; background:var(--p-dim); border-radius:1px;
    width:0%; transition:width 0.8s linear;
  }
  /* sounds list */
  #panel-sounds { max-height: 170px; overflow-y: auto; }
  #panel-sounds::-webkit-scrollbar { width: 2px; }
  #panel-sounds::-webkit-scrollbar-thumb { background: var(--p-dim); }
  .ps-head-row {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 9px;
  }
  .ps-cache-count {
    font-size: 8px; color: var(--p-dim); letter-spacing: 0.06em;
  }
  .sound-entry {
    display: flex; gap: 7px; align-items: baseline;
    font-size: 9px; line-height: 1.5; margin-bottom: 5px;
    opacity: 1; transition: opacity 3s ease 2s;
  }
  .sound-entry.fading { opacity: 0.35; }
  .se-time { color: var(--p-dim); flex-shrink: 0; font-size: 8px; }
  .se-kind {
    flex-shrink: 0; font-size: 7px; letter-spacing: 0.12em; text-transform: uppercase;
    padding: 1px 5px; border-radius: 2px;
  }
  .se-kind.live  { background: #18221a; color: #80b870; }
  .se-kind.ghost { background: #1a1820; color: #8070a8; }
  .se-kind.shake { background: #221818; color: #b07050; }
  .se-dir { color: var(--p-dim); flex-shrink: 0; }
  .se-text {
    color: var(--p-text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1; min-width: 0;
  }
  .se-text.filename { color: var(--p-mid); font-style: italic; }
</style>
</head>
<body>


<div id="debug-overlay">
  <div><span class="dk">ghost</span><span class="dv" id="dbg-ghost">—</span></div>
  <div><span class="dk">sfx</span><span class="dv" id="dbg-sfx">—</span></div>
  <div><span class="dk">tone</span><span class="dv" id="dbg-tone">—</span></div>
</div>

<div id="world-selector">
  <button class="world-btn active" data-world="water">water</button>
  <button class="world-btn" data-world="city">city</button>
  <button class="world-btn" data-world="forest">forest</button>
</div>

<div id="radio">
  <div id="radio-circle">
    <canvas id="world-canvas"></canvas>
  </div>
  <div id="radio-ticker">
    <div class="ticker-mask">
      <span id="ticker-text">—</span>
    </div>
  </div>
  <div id="radio-right">
    <div id="radio-bars">
      <div class="rbar"></div>
      <div class="rbar"></div>
      <div class="rbar"></div>
      <div class="rbar"></div>
      <div class="rbar"></div>
    </div>
    <div class="sc-wrap" style="gap:6px">
      <span class="knob-label">vol</span>
      <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.5">
    </div>
    <button id="start-btn">▶</button>
    <button id="shake-btn" title="shake the radio">⌇</button>
  </div>
</div>

<div id="sfx-display">
  <span class="sfx-dir" id="sfx-dir">♪</span>
  <span id="sfx-prompt"></span>
</div>

<div id="meta">
  <span class="hl" id="tr-world">water</span>
  <span class="sep">·</span>
  <span id="tr-weather">—</span>
  <span class="sep">·</span>
  <span id="tr-clock">—</span>
  <span class="sep">·</span>
  <span id="countdown"></span>
</div>

<div id="mix">
  <div class="mix-row">
    <span class="mix-label">noise</span>
    <input type="range" id="mix-noise" class="mix-slider" min="0" max="1" step="0.01" value="0.6">
  </div>
  <div class="mix-row">
    <span class="mix-label">melody</span>
    <input type="range" id="mix-mel" class="mix-slider" min="0" max="1" step="0.01" value="0.85">
  </div>
  <div class="mix-row">
    <span class="mix-label">pad</span>
    <input type="range" id="mix-pad" class="mix-slider" min="0" max="1" step="0.01" value="0.70">
  </div>
  <div class="mix-row">
    <span class="mix-label">sfx</span>
    <input type="range" id="mix-sfx" class="mix-slider" min="0" max="1" step="0.01" value="0.75">
  </div>
</div>

<div id="secondary">
  <div class="sc-wrap">
    <span class="knob-label">density</span>
    <input type="range" id="density-slider" class="sc-slider" min="0.25" max="3" step="0.05" value="1">
  </div>
  <div class="sc-wrap">
    <span class="knob-label">echo</span>
    <input type="range" id="ghost-slider" class="sc-slider" min="0" max="1" step="0.01" value="0.35">
  </div>
  <div class="sc-wrap">
    <span class="knob-label">bpm</span>
    <input type="range" id="bpm-slider" class="sc-slider" min="20" max="180" step="1" value="80">
    <span id="bpm-val" style="font-size:9px;color:var(--muted);min-width:22px">80</span>
  </div>
</div>

<button id="settings-toggle">· · ·</button>

<!-- ── Side panel ─────────────────────────────────────── -->
<button id="panel-toggle" title="toggle info panel">◂</button>
<div id="side-panel">

  <div class="panel-section">
    <div class="panel-head">state</div>
    <div class="panel-kv"><span class="panel-k">world</span><span class="panel-v" id="ps-world">—</span></div>

// WEB AUDIO
// ═══════════════════════════════════════════════════════════
let ctx, masterGain, ambGain;
let noiseSource, noiseFilter, lfoNode, lfoGain;
let noiseSource2, lfoNode2;
let noiseChGain = null, melodyGain = null, sfxGain = null, padGain = null;
let padFilter = null;   // shared tone bus — updated live as VIBE changes
let padTimer = null;

function buildNoise(type) {
  const bufLen = ctx.sampleRate * 4;
  const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
  const data = buf.getChannelData(0);
  if (type === 'brown') {
    let last = 0;
    for (let i = 0; i < bufLen; i++) {
      const w = Math.random() * 2 - 1;
      data[i] = (last + 0.02 * w) / 1.02; last = data[i]; data[i] *= 3.5;
    }
  } else {
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for (let i = 0; i < bufLen; i++) {
      const w = Math.random() * 2 - 1;
      b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759;
      b2=0.96900*b2+w*0.1538520; b3=0.86650*b3+w*0.3104856;
      b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
      data[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11; b6=w*0.115926;
    }
  }
  const src = ctx.createBufferSource(); src.buffer=buf; src.loop=true; return src;
}

function startAmbient(world) {
  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  if (ctx.state==='suspended') ctx.resume();
  stopAmbient();
  const p = WORLDS[world].ambient;

  masterGain = ctx.createGain();
  masterGain.gain.value = parseFloat(document.getElementById('vol-slider').value);
  masterGain.connect(ctx.destination);

  noiseChGain = ctx.createGain();
  noiseChGain.gain.value = parseFloat(document.getElementById('mix-noise')?.value ?? 0.6);
  noiseChGain.connect(masterGain);

  melodyGain = ctx.createGain();
  melodyGain.gain.value = parseFloat(document.getElementById('mix-mel')?.value ?? 0.6);
  melodyGain.connect(masterGain);

  sfxGain = ctx.createGain();
  sfxGain.gain.value = parseFloat(document.getElementById('mix-sfx')?.value ?? 0.75);
  sfxGain.connect(masterGain);

  padGain = ctx.createGain();
  padGain.gain.value = parseFloat(document.getElementById('mix-pad')?.value ?? 0.70);
  padGain.connect(masterGain);

  // Shared pad tone bus — lowpass, updated continuously as VIBE changes
  padFilter = ctx.createBiquadFilter();
  padFilter.type = 'lowpass';
  padFilter.frequency.value = 350;   // start dark, updatePadTone() will warm it
  padFilter.Q.value = 0.55;
  padFilter.connect(padGain);

  ambGain = ctx.createGain(); ambGain.gain.value=0; ambGain.connect(noiseChGain);

  noiseSource = buildNoise(p.noiseColor);
  const ls = ctx.createBiquadFilter(); ls.type='lowshelf'; ls.frequency.value=p.rumble.freq; ls.gain.value=14;
  noiseFilter = ctx.createBiquadFilter(); noiseFilter.type='bandpass'; noiseFilter.frequency.value=p.shimmer.freq; noiseFilter.Q.value=p.shimmer.q;
  noiseSource.connect(ls); ls.connect(noiseFilter); noiseFilter.connect(ambGain);

  lfoNode = ctx.createOscillator(); lfoNode.type='sine'; lfoNode.frequency.value=p.lfo.rate;
  lfoGain = ctx.createGain(); lfoGain.gain.value=p.lfo.depth;
  lfoNode.connect(lfoGain); lfoGain.connect(ambGain.gain);

  noiseSource2 = buildNoise(p.noiseColor);
  const ls2 = ctx.createBiquadFilter(); ls2.type='lowshelf'; ls2.frequency.value=p.rumble.freq*0.7; ls2.gain.value=10;
  const nf2  = ctx.createBiquadFilter(); nf2.type='bandpass'; nf2.frequency.value=p.shimmer.freq*1.85; nf2.Q.value=p.shimmer.q*1.6;
  const lg2  = ctx.createGain(); lg2.gain.value=0;
  noiseSource2.connect(ls2); ls2.connect(nf2); nf2.connect(lg2); lg2.connect(ambGain);

  lfoNode2 = ctx.createOscillator(); lfoNode2.type='sine'; lfoNode2.frequency.value=p.lfo.rate*1.618;
  const lf2 = ctx.createGain(); lf2.gain.value=p.lfo.depth*0.65;
  lfoNode2.connect(lf2); lf2.connect(lg2.gain);

  noiseSource.start(); noiseSource2.start(); lfoNode.start(); lfoNode2.start();
  ambGain.gain.setTargetAtTime(0.55, ctx.currentTime, 2.5);
  lg2.gain.setTargetAtTime(0.32, ctx.currentTime, 3.5);

  let fw = setInterval(() => {
    if (!noiseFilter) { clearInterval(fw); return; }
    noiseFilter.frequency.setTargetAtTime(p.shimmer.freq*(0.75+Math.random()*0.5), ctx.currentTime, 6);
  }, 8000);
}

function stopAmbient() {
  try { noiseSource  && noiseSource.stop();  } catch(e){}
  try { noiseSource2 && noiseSource2.stop(); } catch(e){}
  try { lfoNode      && lfoNode.stop();      } catch(e){}
  try { lfoNode2     && lfoNode2.stop();     } catch(e){}
  noiseSource=noiseSource2=lfoNode=lfoNode2=null;
  if (ambGain)     { ambGain.disconnect();     ambGain=null; }
  if (noiseChGain) { noiseChGain.disconnect(); noiseChGain=null; }
  if (melodyGain)  { melodyGain.disconnect();  melodyGain=null; }
  if (sfxGain)     { sfxGain.disconnect();     sfxGain=null; }
  if (padFilter)   { padFilter.disconnect();   padFilter=null; }
  if (padGain)     { padGain.disconnect();     padGain=null; }
}

document.getElementById('vol-slider').addEventListener('input', e => {
  if (masterGain) masterGain.gain.setTargetAtTime(parseFloat(e.target.value), ctx.currentTime, 0.1);
});

// ELEVENLABS SFX
// ═══════════════════════════════════════════════════════════
async function playSFX(soundPrompt, direction, vol=1.0) {
  debugLine('sfx', soundPrompt.slice(0,38));
  try {
    const res = await fetch('/sfx', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ text:soundPrompt, duration_seconds:4, prompt_influence:0.4, world:S.world })
    });
    if (!res.ok) return;
    const ab  = await res.arrayBuffer();
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state==='suspended') ctx.resume();
    const buf = await ctx.decodeAudioData(ab);
    const src = ctx.createBufferSource(); src.buffer=buf;
    const lp  = ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=900; lp.Q.value=0.7;
    const pan = ctx.createStereoPanner();
    pan.pan.value = ({left:-0.7,right:0.7,ahead:0,behind:0,above:0,'all around':0})[direction]??0;
    const sg  = ctx.createGain(); sg.gain.value = 0;
    src.connect(lp); lp.connect(pan); pan.connect(sg); sg.connect(sfxGain||masterGain||ctx.destination);
    const st = ctx.currentTime;
    sg.gain.setTargetAtTime(0.55 * vol, st, 0.3);
    sg.gain.setTargetAtTime(0, st + 3.5, 0.9);
    src.start();

    // Show prompt below the radio
    showSFXLabel(soundPrompt, direction);
    // Log to panel sounds list
    addSoundEntry(soundPrompt, direction, 'live');
    // Refresh ghost cache list so the new file becomes available
    setTimeout(() => { ghostFetch().then(updateCacheCount); }, 4500);

  } catch(e) { console.warn('SFX fail:',e); }
}

let _sfxLabelTimer = null;
function showSFXLabel(prompt, direction) {
  const wrap = document.getElementById('sfx-display');
  const dirEl = document.getElementById('sfx-dir');
  const textEl = document.getElementById('sfx-prompt');
  if (!wrap || !textEl) return;

  const dirSymbol = { left:'←', right:'→', ahead:'↑', behind:'↓', above:'↑', 'all around':'·' }[direction] ?? '·';
  dirEl.textContent = dirSymbol;
  textEl.textContent = prompt;

  wrap.classList.add('visible');
  clearTimeout(_sfxLabelTimer);
  _sfxLabelTimer = setTimeout(() => wrap.classList.remove('visible'), 3800);
}

function playSounds(sounds, direction) {
  if (!sounds || !sounds.length) return;
  sounds.forEach(s => {
    setTimeout(() => playSFX(s.prompt, direction, s.vol ?? 1.0).catch(()=>{}), s.delay ?? 0);
  });
}

// GHOST LAYER — cached SFX played back muffled as texture
// ═══════════════════════════════════════════════════════════
let ghostMasterGain = null;
const GHOST = { active:false, files:[], loopTimer:null, refreshTimer:null };

async function ghostFetch() {
  try {
    const res = await fetch('/sfx-cache');
    if (res.ok) {
      const all = await res.json();
      const worldFiles = all.filter(f => f.startsWith(S.world));
      GHOST.files = worldFiles.length > 0 ? worldFiles : all;
    }
  } catch(e) {}
}

async function ghostPlay() {
  if (!GHOST.active || GHOST.files.length===0 || !ctx) return;
  const file = GHOST.files[Math.floor(Math.random()*GHOST.files.length)];
  try {
    const res = await fetch(`/sfx-cache/${encodeURIComponent(file)}`);
    if (!res.ok) return;
    const ab  = await res.arrayBuffer();
    const buf = await ctx.decodeAudioData(ab);
    const src = ctx.createBufferSource(); src.buffer=buf;
    const lpf = ctx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=380+Math.random()*220; lpf.Q.value=0.4;
    const pan = ctx.createStereoPanner(); pan.pan.value=(Math.random()-0.5)*0.6;
    const gain = ctx.createGain(); gain.gain.value=0;
    src.connect(lpf); lpf.connect(pan); pan.connect(gain); gain.connect(ghostMasterGain||masterGain||ctx.destination);
    const vol = parseFloat(document.getElementById('ghost-slider').value);
    const now = ctx.currentTime, dur = buf.duration;
    gain.gain.setTargetAtTime(vol*0.36, now, 1.2);
    gain.gain.setTargetAtTime(0, now+dur-1.5, 1.0);
    src.start(); src.stop(now+dur+0.5);
    debugLine('ghost', file);
    // Log to panel — strip world prefix and timestamp, convert underscores to spaces
    addSoundEntry(file, null, 'ghost');
  } catch(e) {}
}

function scheduleGhost() {
  if (!GHOST.active) return;
  const delay = 18000+Math.random()*45000;
  GHOST.loopTimer = setTimeout(async () => {
    await ghostPlay();
    if (Math.random()<0.3) setTimeout(ghostPlay, rnd(3000,9000));
    scheduleGhost();
  }, delay);
}

function startGhostLayer() {
  if (!ctx) return;
  GHOST.active=true;
  ghostMasterGain = ctx.createGain();
  ghostMasterGain.gain.value = parseFloat(document.getElementById('ghost-slider').value);
  ghostMasterGain.connect(masterGain);
  ghostFetch();
  GHOST.refreshTimer = setInterval(ghostFetch, 30000);
  GHOST.loopTimer = setTimeout(() => { ghostPlay(); scheduleGhost(); }, 12000);
}

const beatMs = () => 60000 / S.bpm;

// VIBE — continuous world-mood state, drives melody character
const VIBE = { activity: 0.3, tension: 0.2, register: 0.5 };
const VIBE_TYPE = {
  moment:      { activity: 0.65, tension: 0.35 },
  interaction: { activity: 0.88, tension: 0.70 },
  shift:       { activity: 0.60, tension: 0.50 },
  passing:     { activity: 0.48, tension: 0.25 },
  distant:     { activity: 0.28, tension: 0.15 },
  residue:     { activity: 0.18, tension: 0.10 },
  conflict:    { activity: 0.80, tension: 0.90 },
};
const VIBE_TIME = {
  'late night':0.15,'night':0.20,'early morning':0.30,'dawn':0.40,
  'morning':0.65,'midday':0.82,'afternoon':0.70,'dusk':0.45,'evening':0.35,
};
const VIBE_WEATHER = {
  'dry still':        { register: 0.70, tension: 0.12, lfoMult: 0.65 },
  'clear':            { register: 0.72, tension: 0.10, lfoMult: 0.60 },
  'overcast':         { register: 0.50, tension: 0.22, lfoMult: 0.90 },
  'light rain':       { register: 0.38, tension: 0.32, lfoMult: 1.20 },
  'heavy rain':       { register: 0.22, tension: 0.55, lfoMult: 1.60 },
  'after rain':       { register: 0.48, tension: 0.18, lfoMult: 0.80 },
  'frost':            { register: 0.15, tension: 0.08, lfoMult: 0.45 },
  'wind':             { register: 0.55, tension: 0.42, lfoMult: 1.30 },
  'fog':              { register: 0.28, tension: 0.28, lfoMult: 0.75 },
  'solar minimum':    { register: 0.50, tension: 0.10, lfoMult: 0.60 },
  'solar flare':      { register: 0.75, tension: 0.80, lfoMult: 2.00 },
  'geomagnetic storm':{ register: 0.60, tension: 0.70, lfoMult: 1.80 },
  'deep silence':     { register: 0.20, tension: 0.05, lfoMult: 0.30 },
  'ion storm':        { register: 0.65, tension: 0.85, lfoMult: 2.20 },
  'coronal mass ejection':{ register: 0.80, tension: 0.90, lfoMult: 2.50 },
};
function updateVibe(ev) {
  const tgt = VIBE_TYPE[ev?.type] || { activity:0.4, tension:0.3 };
  VIBE.activity += (tgt.activity - VIBE.activity) * 0.35;
  VIBE.tension  += (tgt.tension  - VIBE.tension)  * 0.30;
  const tod = (S.timeOfDay||'').toLowerCase();
  for (const [k,v] of Object.entries(VIBE_TIME)) {
    if (tod.includes(k)) { VIBE.register += (v - VIBE.register) * 0.15; break; }
  }
  // Animate pad brightness to match new vibe — fast snap (1.5s) on notable events
  const fast = ev?.type === 'conflict' || ev?.type === 'interaction';
  if (typeof updatePadTone === 'function') updatePadTone(fast ? 1.5 : 4.0);
}

function applyWeatherToVibe() {
  const wv = VIBE_WEATHER[S.weather];
  if (!wv) return;
  VIBE.register += (wv.register - VIBE.register) * 0.4;
  VIBE.tension  += (wv.tension  - VIBE.tension)  * 0.3;
  if (typeof updatePadTone === 'function') updatePadTone(8.0); // slow weather drift
  if (lfoGain && ctx) {
    const base = WORLDS[S.world].ambient.lfo.depth;
    lfoGain.gain.setTargetAtTime(base * wv.lfoMult, ctx.currentTime, 10);
  }
}

function driftWeather() {
  if (!S.running) return;
  const world = WORLDS[S.world];
  const options = world.weathers.filter(w => w !== S.weather);
  S.weather = options[Math.floor(Math.random() * options.length)];
  const el = document.getElementById('tr-weather');
  el.textContent = `${S.weather} · ${S.timeOfDay}`;
  el.style.transition = 'none'; el.style.color = 'var(--accent)';
  setTimeout(() => { el.style.transition = 'color 3s'; el.style.color = ''; }, 80);
  setTimeout(() => { el.style.transition = ''; }, 3200);
  applyWeatherToVibe();
  scheduleWeatherDrift();
}

function scheduleWeatherDrift() {
  clearTimeout(S.weatherTimeout);
  if (!S.running) return;
  const delay = (5 + Math.random() * 10) * 60 * 1000;
  S.weatherTimeout = setTimeout(driftWeather, delay);
}

function playNote(world, freq, relOverride) {
  if (!ctx || !masterGain) return;
  const m = MELODY_CFG[world];

  // ±8 cent human-touch detune — alive but not wrong
  const cents = (Math.random() * 16 - 8);
  const f = freq * Math.pow(2, cents / 1200);

  // timing jitter ±20ms
  const t = ctx.currentTime + Math.max(0, Math.random() * 0.04 - 0.02);
  const atk = m.atk ?? 0.020;
  const rel = relOverride !== undefined ? relOverride : (m.relShort ?? 0.40) + Math.random() * 0.08;

  // main oscillator — clean, no dissonance added
  const osc = ctx.createOscillator();
  osc.type = m.wave || 'sine';
  osc.frequency.value = f;

  // soft envelope
  const env = ctx.createGain();
  env.gain.setValueAtTime(0, t);
  env.gain.linearRampToValueAtTime(m.vol, t + atk);
  env.gain.exponentialRampToValueAtTime(0.0001, t + atk + rel);

  const dest = melodyGain || masterGain;

  // gentle peaking colour
  const peak = ctx.createBiquadFilter();
  peak.type = 'peaking';
  peak.frequency.value = m.peakHz ?? 1000;
  peak.gain.value = m.peakGain ?? 2;
  peak.Q.value = 0.8;

  // wet reverb tail — harmonic blend
  const dly = ctx.createDelay(1.0); dly.delayTime.value = m.dlyTime ?? 0.18;
  const fb  = ctx.createGain(); fb.gain.value = m.dlyFb ?? 0.38;
  const wet = ctx.createGain(); wet.gain.value = m.dlyWet ?? 0.35;

  // routing (clean: no tritone osc, no waveshaper)
  osc.connect(env);
  env.connect(peak); peak.connect(dest);
  peak.connect(dly); dly.connect(fb); fb.connect(dly);
  dly.connect(wet); wet.connect(dest);

  const stopT = t + atk + rel + 1.5;
  osc.start(t);
  osc.stop(stopT);
}

function playPhrase(world) {
  const m = MELODY_CFG[world]; if (!m||!ctx||!masterGain||!S.running) return;

  const fl   = m.freqs.length;
  // beat: use a fixed 70bpm feel regardless of S.bpm, so phrases feel musical not mechanical
  const beat = 860;

  const patterns = m.rhythms;
  const pat = patterns[Math.floor(Math.random() * patterns.length)];

  // starting pitch — register maps into freq array
  const center = Math.round(VIBE.register * (fl - 1));
  let idx = Math.max(0, Math.min(fl - 1, center + Math.round((Math.random() - 0.5) * 3)));

  // walk pattern — only scale notes, no wrong-note injection
  let t = 0;
  const events = [];
  pat.forEach(dur => {
    if (dur !== null) {
      const freq = m.freqs[Math.max(0, Math.min(fl - 1, idx))];
      events.push({ ms: t, freq });
      const dir = Math.random() < 0.5 ? 1 : -1;
      const step = 1 + Math.floor(Math.random() * 2);
      idx = Math.max(0, Math.min(fl - 1, idx + dir * step));
    }
    t += beat * (dur ?? 1);
  });

  // last note rings long, others have warm sustain
  events.forEach((ev, i) => {
    const isLast = i === events.length - 1;
    const rel = isLast
      ? (m.relLong ?? 3.0) + Math.random() * 0.5
      : (m.relShort ?? 0.50) + Math.random() * 0.15;
    setTimeout(() => { if (S.running) playNote(world, ev.freq, rel); }, ev.ms);
  });

  debugLine('tone', events.map(e => Math.round(e.freq) + 'Hz').join(' · '));

  // long silence before next phrase (interval in seconds)
  const [iMin, iMax] = m.interval || [30, 80];
  const wait = (iMin + Math.random() * (iMax - iMin)) * 1000;
  melodyTimer = setTimeout(() => { if (S.running) playPhrase(S.world); }, t + wait);
}

// Reactive accent — only on significant events, 1-2 harmonic notes
function playReact(ev) {
  if (!ctx || !masterGain || !S.running) return;
  const m = MELODY_CFG[S.world]; if (!m) return;
  // Only react to notable events; skip minor ones entirely
  const notable = { conflict:true, interaction:true, shift:true };
  if (!notable[ev?.type]) return;
  if (Math.random() < 0.45) return; // 45% chance to stay silent even then

  const fl = m.freqs.length;
  const center = Math.round(VIBE.register * (fl - 1));
  const count = ev?.type === 'conflict' ? 2 : 1;
  for (let i = 0; i < count; i++) {
    const offset = Math.round((Math.random() - 0.5) * 3);
    const freq = m.freqs[Math.max(0, Math.min(fl-1, center + offset))];
    const rel = (m.relShort ?? 0.50) + Math.random() * 0.2;
    setTimeout(() => { if (S.running) playNote(S.world, freq, rel); }, i * 280 + Math.random() * 60);
  }
}

function startMelody(world) {
  stopMelody();
  const m = MELODY_CFG[world]; if (!m) return;
  // First phrase after 12-25s so the world has time to breathe first
  const initDelay = (12 + Math.random() * 13) * 1000;
  melodyTimer = setTimeout(()=>{ if(S.running) playPhrase(world); }, initDelay);
}

function stopMelody() { clearTimeout(melodyTimer); melodyTimer = null; }

// PAD LAYER — long slow notes fading in/out, tuned to VIBE
// ═══════════════════════════════════════════════════════════
const PAD_CFG = {
  // water — open fifths and fourths, deep sine, very slow fade
  water:  { freqs:[130.81,174.61,196.00,261.63,293.66,349.23,392.00],
            vol:0.038, fadeIn:3.5, hold:6.0, fadeOut:4.0, interval:[8,18] },
  // city — minor 2nds and tritones, sawtooth filtered down, tense
  city:   { freqs:[110.00,116.54,146.83,155.56,185.00,220.00,233.08],
            vol:0.030, fadeIn:2.0, hold:4.0, fadeOut:2.5, interval:[5,12] },
  // forest — low harmonics, pure sine, very long and quiet
  forest: { freqs:[98.00,130.81,146.83,174.61,196.00,261.63,293.66],
            vol:0.032, fadeIn:5.0, hold:9.0, fadeOut:6.0, interval:[12,25] },
};

// ── Pad tone control — call whenever VIBE changes ──────────────
function updatePadTone(transitionSecs) {
  if (!padFilter || !ctx) return;
  const tc = transitionSecs ?? 3.0;
  // tension 0→1 maps filter 120Hz (subterranean dark) → 2200Hz (bright shimmer)
  // use a power curve so changes at low tension feel dramatic
  const freq = 120 + Math.pow(VIBE.tension, 0.65) * 2080;
  padFilter.frequency.setTargetAtTime(freq, ctx.currentTime, tc / 3);
}

function playPad(world) {
  if (!ctx || !padFilter || !S.running) return;
  const p = PAD_CFG[world]; if (!p) return;

  // register maps VIBE into freq list
  const fl = p.freqs.length;
  const center = Math.round((1 - VIBE.register) * (fl - 1));
  const offset = Math.floor((Math.random() - 0.5) * 3);
  const freq = p.freqs[Math.max(0, Math.min(fl - 1, center + offset))];

  // activity drives how many voices and how loud
  const vol = p.vol * (0.7 + VIBE.activity * 0.55);

  // voices: always fundamental; add fifth if active enough; add octave at high activity
  const voices = [{ f: freq, v: vol }];
  if (VIBE.activity > 0.25 || Math.random() < 0.4)
    voices.push({ f: freq * 1.5,  v: vol * 0.38 });           // perfect fifth
  if (VIBE.activity > 0.65)
    voices.push({ f: freq * 2.0,  v: vol * 0.22 });           // octave above
  if (VIBE.tension > 0.70)
    voices.push({ f: freq * Math.pow(2, 7/12), v: vol * 0.20 }); // fifth (reinforced) adds density

  // activity drives fade speed — tense/active moments breathe faster
  const actMult = 0.4 + VIBE.activity * 1.2;
  const fadeIn   = p.fadeIn  / actMult;
  const hold     = p.hold    / (0.5 + VIBE.activity * 0.8);
  const fadeOut  = p.fadeOut / actMult;

  voices.forEach(({ f, v }) => {
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = f;

    const env = ctx.createGain(); env.gain.value = 0;
    const now = ctx.currentTime;
    env.gain.setTargetAtTime(v, now, fadeIn / 3);
    env.gain.setTargetAtTime(v * 0.82, now + fadeIn, 1.0);
    env.gain.setTargetAtTime(0.0001, now + fadeIn + hold, fadeOut / 3);

    // route through shared padFilter (tone controlled globally)
    osc.connect(env); env.connect(padFilter);
    osc.start(now);
    osc.stop(now + fadeIn + hold + fadeOut + 0.5);
  });
}

function schedulePad() {
  clearTimeout(padTimer);
  if (!S.running) return;
  const p = PAD_CFG[S.world]; if (!p) return;
  const [iMin, iMax] = p.interval;
  // VIBE.activity shrinks the interval: calm = max wait, conflict = min wait
  const t = iMax - (iMax - iMin) * Math.pow(VIBE.activity, 0.7);
  const jitter = (Math.random() - 0.5) * (iMax - iMin) * 0.25;
  const delay = Math.max(iMin, t + jitter) * 1000;
  padTimer = setTimeout(() => { playPad(S.world); schedulePad(); }, delay);
}

function startPad(world) {
  stopPad();
  if (!PAD_CFG[world]) return;
  padTimer = setTimeout(() => {
    updatePadTone(0.1);   // set initial tone immediately
    playPad(world);
    schedulePad();
  }, 3000 + Math.random() * 4000);
}

function stopPad() { clearTimeout(padTimer); padTimer = null; }

function stopGhostLayer() {
  GHOST.active=false;
  clearTimeout(GHOST.loopTimer); clearInterval(GHOST.refreshTimer);
  if (ghostMasterGain) { ghostMasterGain.disconnect(); ghostMasterGain=null; }
}

const PHASES = [
  { minW:10, maxW:28, clusterP:0.06, clusterN:1 },
  { minW: 6, maxW:15, clusterP:0.14, clusterN:1 },
  { minW: 3, maxW: 9, clusterP:0.30, clusterN:2 },
  { minW: 2, maxW: 5, clusterP:0.58, clusterN:3 },
  { minW: 5, maxW:14, clusterP:0.16, clusterN:1 },
  { minW: 8, maxW:22, clusterP:0.08, clusterN:1 },
];
const PHASE_LEN = [4,3,4,5,3,4];
let phaseIdx=0, phaseEvts=0;
function phase(){ return PHASES[phaseIdx%PHASES.length]; }
function tickPhase(){ if(++phaseEvts>=PHASE_LEN[phaseIdx%PHASE_LEN.length]){phaseEvts=0;phaseIdx++;} }
function nextDelay(){ const p=phase(); const raw=rnd(p.minW,p.maxW)*(Math.random()<0.07?rnd(1.5,2.8):1)*1000/S.density; const beat=beatMs(); return Math.max(beat,Math.round(raw/beat)*beat); }
function rnd(a,b){ return a+Math.random()*(b-a); }

// CLAUDE
// ═══════════════════════════════════════════════════════════
function buildProximityNote() {
  const agents = WORLDS[S.world].agents;
  const pairs  = [];
  for (let i = 0; i < agents.length; i++) {
    for (let j = i+1; j < agents.length; j++) {
      const pi = VIEW.pos[agents[i].id] || AGENT_POS[S.world][agents[i].id];
      const pj = VIEW.pos[agents[j].id] || AGENT_POS[S.world][agents[j].id];
      if (!pi||!pj) continue;
      const dx=pi.gx-pj.gx, dz=pi.gz-pj.gz;
      if (Math.sqrt(dx*dx+dz*dz)<1.4) pairs.push(`${agents[i].label} & ${agents[j].label}`);
    }
  }
  return pairs.length ? pairs.join(', ') : 'none';
}

async function callClaude() {
  const world = WORLDS[S.world];
  const agentBlock = world.agents.map(a =>
    `- ${a.label} [${a.id}]: ${a.desc}\n  state: ${S.agentStates[a.id]||a.state}`
  ).join('\n');
  const recentBlock = S.recentEvents.slice(-5).map(e=>`[${e.agent}] ${e.description}`).join('\n')||'none yet';

  const prompt =
`ENVIRONMENT: ${world.label}
WEATHER / CONDITIONS: ${S.weather}
TIME / PHASE: ${S.timeOfDay}
EVENTS SO FAR: ${S.eventCount}

AGENTS:
${agentBlock}

RECENT (evolve from, don't repeat):
${recentBlock}

CLOSE PAIRS right now (consider interaction or conflict):
${buildProximityNote()}
${S.arc.ready ? `
STORY ARC: "${S.arc.title}"
"${S.arc.logline}"
BEAT ${S.arc.beatIdx + 1} of ${S.arc.beats.length}: ${S.arc.beats[S.arc.beatIdx] || ''}
Events on this beat: ${S.arc.beatEvents} — set advance_beat true when this beat feels complete (min 2 events).` : ''}

Respond ONLY with valid JSON, no markdown:
{
  "description": "one sentence — only what is heard / sensed",
  "agent": "agent label",
  "type": "distant|passing|moment|shift|interaction|residue|conflict",
  "direction": "ahead|behind|left|right|above|all around",
  "sounds": [
    { "prompt": "first sound, max 10 words", "delay": 0,    "vol": 0.70 },
    { "prompt": "second sound, max 10 words", "delay": 1200, "vol": 0.42 },
    { "prompt": "third sound, max 10 words",  "delay": 2800, "vol": 0.28 }
  ],
  "agent_updates": { "agent_id": "new state" },
  "advance_beat": false
}

sounds: 1 required, 2 and 3 optional. Spread sounds across 0–4 seconds. No sound should be loud or sharp — think layers heard through space. First is the main event (vol ~0.70), second arrives later as context or echo (vol ~0.40), third is a distant residue or environmental bleed (vol ~0.25). Together they fill the gap between events.
advance_beat: set true only when the current arc beat has resolved and the story is ready to move to the next beat.`;

  const res = await fetch('/claude', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:500, system:world.systemPrompt, messages:[{role:'user',content:prompt}] })
  });
  if (!res.ok) throw new Error(`${res.status}`);
  const data = await res.json();
  const rawText = data.content[0].text.trim().replace(/```json|```/g,'').trim();
  const ev = JSON.parse(rawText);
  return { ev, rawPrompt: prompt, rawResponse: rawText };
}

// ═══════════════════════════════════════════════════════════
function scheduleNext(){
  if(!S.running) return;
  const delay=nextDelay(); S.nextAt=Date.now()+delay;
  if(delay>14000) setTimeout(()=>{ if(S.running) addSilence(); },1800);
  S.nextTimeout=setTimeout(async()=>{
    if(!S.running) return;
    const p=phase(); const n=Math.random()<p.clusterP?p.clusterN:1;
    for(let i=0;i<n;i++){
      if(!S.running) break;
      if(i>0) await sleep(rnd(1200,3500));
      await fireEvent();
    }
    scheduleNext();
  },delay);
}

async function fireEvent(){
  ripple(); setStatus('—');
  try {
    const { ev, rawPrompt, rawResponse } = await callClaude();
    if(ev.agent_updates){ for(const [id,st] of Object.entries(ev.agent_updates)) S.agentStates[id]=st; }
    addEventRow(ev);
    S.recentEvents.push(ev); if(S.recentEvents.length>8) S.recentEvents.shift();
    S.eventCount++; tickPhase();
    // Arc beat tracking
    if (S.arc.ready) {
      S.arc.beatEvents++;
      if (ev.advance_beat && S.arc.beatEvents >= 2) advanceBeat();
      else if (S.arc.beatEvents >= 6) advanceBeat(); // safety auto-advance
    }
    updateVibe(ev);
    playReact(ev);
    flashAgent(ev.agent, ev.agent_updates);
    updateClock();
    addPanelEntry(rawPrompt, rawResponse, ev);
    updatePanelAgents();
    updatePanelState();
    updatePanelArc();
    if(ev.sounds) playSounds(ev.sounds, ev.direction);
    else if(ev.sound_prompt) playSFX(ev.sound_prompt, ev.direction).catch(()=>{});
  } catch(e){ console.warn('event failed:',e); setStatus('retry…'); }
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

function addEventRow(ev){
  // Update ticker
  const tEl = document.getElementById('ticker-text');
  if (tEl) {
    const label = (ev.agent || '').toLowerCase();
    const desc  = ev.description || '';
    const full  = label ? `${label} — ${desc}` : desc;
    tEl.classList.remove('running');
    void tEl.offsetWidth; // force reflow to restart animation
    tEl.textContent = full;
    const maskW = tEl.parentElement?.offsetWidth || 200;
    const textW = tEl.scrollWidth;
    if (textW > maskW) {
      const shift = `-${((textW - maskW + 20) / textW * 100).toFixed(1)}%`;
      const dur   = (textW / 40).toFixed(1) + 's';
      tEl.style.setProperty('--ticker-shift', shift);
      tEl.style.setProperty('--ticker-dur', dur);
      tEl.classList.add('running');
    }
  }
  const log=document.getElementById('event-log');
  const time=new Date().toTimeString().slice(0,5);
  const tag=(ev.agent||'').slice(0,5).toLowerCase();
  const el=document.createElement('div');
  el.className=`ev ${ev.type||'moment'}`;
  el.innerHTML=`<span class="ev-time">${time}</span><span class="ev-agent">${tag}</span><span class="ev-desc">${ev.description}</span><span class="ev-type">${ev.type||''}</span>`;
  log.appendChild(el); pruneLog(log);
}

function addSilence(){
  const log=document.getElementById('event-log');
  const el=document.createElement('div'); el.className='ev';
  el.innerHTML=`<div class="ev-silence">· · ·</div>`;
  log.appendChild(el); pruneLog(log);
}

function pruneLog(log){
  const evs=log.querySelectorAll('.ev');
  if(evs.length>9){ evs[0].classList.add('gone'); setTimeout(()=>evs[0].remove(),4500); }
}

function ripple(){
  const p=document.getElementById('pulse');
  p.classList.remove('pop'); void p.offsetWidth; p.classList.add('pop');
}

function setStatus(msg){ document.getElementById('api-stat').textContent=msg; }

function updateClock(){
  const el=Math.floor((Date.now()-S.startTime)/1000);
  const m=String(Math.floor(el/60)).padStart(2,'0');
  const s=String(el%60).padStart(2,'0');
  document.getElementById('tr-clock').textContent=`${m}:${s} · ${S.eventCount} events`;
}

function flashAgent(label, agentUpdates){
  const primary=WORLDS[S.world].agents.find(a=>a.label===label);
  if (primary) VIEW.pulses[primary.id]=Date.now();
  if (agentUpdates){
    for (const id of Object.keys(agentUpdates)){
      if (!VIEW.pulses[id]||Date.now()-VIEW.pulses[id]>300) VIEW.secondary[id]=Date.now();
    }
  }
  document.querySelectorAll('.agent-pill').forEach(pill=>{
    const isThis=pill.dataset.label===label;
    pill.classList.toggle('lit',isThis);
    if(isThis){ setTimeout(()=>{ pill.classList.remove('lit'); pill.classList.add('warm'); setTimeout(()=>pill.classList.remove('warm'),6000); },2500); }
  });
}

// STORY ARC — epoch-based narrative with beat tracking
// ═══════════════════════════════════════════════════════════

const ARC_SYSTEM = `You generate story arcs for living ambient sound worlds.
An arc is a short grounded narrative that plays out through a sequence of sound events.
Keep it earthy and specific — things that could actually be heard.
No metaphors, no drama for drama's sake. Just what unfolds.`;

async function generateArc() {
  if (!S.running) return;
  S.arc.generating = true; S.arc.ready = false;
  updatePanelArc();
  const world = WORLDS[S.world];
  const agentNames = world.agents.map(a => a.label).join(', ');
  const memory = S.arc.prevTitle
    ? `PREVIOUS ARC: "${S.arc.prevTitle}" — "${S.arc.prevLogline}" (let this linger loosely)`
    : `PREVIOUS ARC: none`;

  const prompt =
`WORLD: ${world.label}
TIME: ${S.timeOfDay}
WEATHER: ${S.weather}
AGENTS: ${agentNames}

${memory}

Generate a story arc for this epoch. It should involve 2–3 agents and feel grounded in what you'd actually hear in this environment. Something small, specific, and consequential.

Respond ONLY with valid JSON:
{
  "title": "short evocative title, 3–5 words",
  "logline": "one sentence — what happens across this arc",
  "beats": [
    "setup: ...",
    "development: ...",
    "peak: ...",
    "resolution: ...",
    "residue: ..."
  ]
}`;

  try {
    const res = await fetch('/claude', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:400,
        system: ARC_SYSTEM, messages:[{role:'user',content:prompt}] })
    });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    const parsed = JSON.parse(data.content[0].text.trim().replace(/```json|```/g,'').trim());
    S.arc.title    = parsed.title    || S.timeOfDay;
    S.arc.logline  = parsed.logline  || '';
    S.arc.beats    = Array.isArray(parsed.beats) ? parsed.beats : ['unfolds'];
    S.arc.beatIdx  = 0;
    S.arc.beatEvents = 0;
  } catch(e) {
    console.warn('arc generation failed:', e);
    S.arc.title   = S.timeOfDay;
    S.arc.logline = '';
    S.arc.beats   = ['setup', 'development', 'peak', 'resolution', 'residue'];
    S.arc.beatIdx = 0; S.arc.beatEvents = 0;
  }
  S.arc.generating = false; S.arc.ready = true;
  applyArcBeatMood(); // prime VIBE for beat 0 (setup)
  updatePanelArc();
}

// Arc beat moods: indexed 0-4 (setup → development → peak → resolution → residue)
// Values are VIBE targets pushed toward when a beat advances
const ARC_BEAT_MOODS = [
  { activity:0.18, tension:0.12, register:0.35 }, // 0 setup    — still, anticipatory
  { activity:0.42, tension:0.38, register:0.55 }, // 1 development — building
  { activity:0.78, tension:0.72, register:0.80 }, // 2 peak      — intense, bright
  { activity:0.38, tension:0.22, register:0.48 }, // 3 resolution — settling
  { activity:0.12, tension:0.07, register:0.28 }, // 4 residue   — quiet, dark
];

function applyArcBeatMood() {
  if (!S.arc.ready) return;
  const beats = S.arc.beats.length || 5;
  // normalize beatIdx to 0-4 range regardless of how many beats exist
  const moodIdx = Math.min(4, Math.round(S.arc.beatIdx / Math.max(beats - 1, 1) * 4));
  const mood = ARC_BEAT_MOODS[moodIdx];
  if (!mood) return;
  // Push VIBE partway toward the arc mood — don't override event-driven state entirely
  const blend = 0.35;
  VIBE.activity = VIBE.activity + (mood.activity - VIBE.activity) * blend;
  VIBE.tension  = VIBE.tension  + (mood.tension  - VIBE.tension)  * blend;
  VIBE.register = VIBE.register + (mood.register - VIBE.register) * blend;
  // Pad tone shifts over 3s to reflect new beat mood
  updatePadTone(3.0);
  // Melody register will adjust naturally via VIBE.register on next phrase
  debugLine('arc', `beat ${S.arc.beatIdx} → mood ${moodIdx} (t=${mood.tension.toFixed(2)})`);
}

function advanceBeat() {
  if (!S.arc.ready || S.arc.beatEvents < 2) return;
  if (S.arc.beatIdx < S.arc.beats.length - 1) {
    S.arc.beatIdx++;
    S.arc.beatEvents = 0;
    applyArcBeatMood();
    updatePanelArc();
  }
}

let _epochStart = 0;
let _epochDuration = 0;
let _epochBarInterval = null;

function scheduleEpoch() {
  clearTimeout(S.arc.epochTimer);
  clearInterval(_epochBarInterval);
  if (!S.running) return;
  _epochDuration = (5 + Math.random() * 4) * 60 * 1000; // 5–9 min
  _epochStart = Date.now();
  // Animate the epoch progress bar
  _epochBarInterval = setInterval(() => {
    const bar = document.getElementById('pa-epoch-bar');
    if (bar) bar.style.width = Math.min(100, (Date.now() - _epochStart) / _epochDuration * 100).toFixed(1) + '%';
  }, 4000);
  S.arc.epochTimer = setTimeout(advanceEpoch, _epochDuration);
}

async function advanceEpoch() {
  if (!S.running) return;
  clearInterval(_epochBarInterval);
  // Save loose memory
  S.arc.prevTitle   = S.arc.title;
  S.arc.prevLogline = S.arc.logline;
  // Advance time of day
  const world = WORLDS[S.world];
  S.arc.epochIdx = (S.arc.epochIdx + 1) % world.times.length;
  S.timeOfDay = world.times[S.arc.epochIdx];
  // Flash display
  const weatherEl = document.getElementById('tr-weather');
  if (weatherEl) weatherEl.textContent = `${S.weather} · ${S.timeOfDay}`;
  const timeEl = document.getElementById('ps-time');
  if (timeEl) { timeEl.style.color = 'var(--p-accent)'; setTimeout(() => timeEl.style.color = '', 2500); }
  updatePanelState();
  // Generate new arc, then re-schedule
  await generateArc();
  scheduleEpoch();
}

function updatePanelArc() {
  const titleEl    = document.getElementById('pa-title');
  const loglineEl  = document.getElementById('pa-logline');
  const dotsEl     = document.getElementById('pa-dots');
  const beatDesc   = document.getElementById('pa-beat-desc');
  const epochLabel = document.getElementById('pa-epoch');
  if (!titleEl) return;

  if (S.arc.generating) {
    titleEl.textContent  = 'composing arc…';
    titleEl.className    = 'arc-title generating';
    loglineEl.textContent = '';
    dotsEl.innerHTML     = '';
    beatDesc.textContent = '';
    if (epochLabel) epochLabel.textContent = `epoch ${S.arc.epochIdx + 1}`;
    return;
  }

  if (!S.arc.ready) {
    titleEl.textContent  = 'waiting to start';
    titleEl.className    = 'arc-title generating';
    loglineEl.textContent = '';
    dotsEl.innerHTML     = '';
    beatDesc.textContent = '';
    if (epochLabel) epochLabel.textContent = '—';
    return;
  }

  // Title & logline
  titleEl.textContent   = S.arc.title;
  titleEl.className     = 'arc-title';
  loglineEl.textContent = S.arc.logline;

  // Beat dots
  dotsEl.innerHTML = '';
  S.arc.beats.forEach((beat, i) => {
    const dot = document.createElement('span');
    dot.className = 'arc-dot' +
      (i < S.arc.beatIdx ? ' done' : i === S.arc.beatIdx ? ' active' : '');
    dot.title = beat;
    dotsEl.appendChild(dot);
  });

  // Current beat description (strip "setup: " prefix labels)
  const raw = S.arc.beats[S.arc.beatIdx] || '';
  beatDesc.textContent = raw.replace(/^[a-z]+:\s*/i, '');

  // Epoch label
  const world = WORLDS[S.world];
  if (epochLabel) {
    const timeLabel = world ? world.times[S.arc.epochIdx] || '' : '';
    epochLabel.textContent = `epoch ${S.arc.epochIdx + 1} · ${timeLabel}`;
  }
}

  water:  ['#00e5ff','#5bc8f5','#c8f542','#ffe156','#7c6ef5','#f0f0f0','#ff4db8','#5bc8f5'],
  city:   ['#ff4db8','#ffe156','#f542c2','#ff5252','#7c6ef5','#f0f0f0','#00e5ff','#c8f542'],

function hexAlpha(hex, a) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${Math.max(0,Math.min(1,a)).toFixed(2)})`;
}

function hashInt(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}

function makeCreatureProfile(agentId, world) {
  const h = hashInt(agentId + '_' + world);
  const pal = WORLD_PALETTE[world] || WORLD_PALETTE.water;
  const pi = (seed) => pal[((h * (seed * 2654435761 >>> 0)) >>> 0) % pal.length];
  const fr = (seed) => (((h * (seed * 2654435761 >>> 0)) >>> 0) % 1000) / 1000;
  const bodies  = ['square','circle','hexagon','pentagon','doubleRing','none'];
  const heads   = ['circle','square','triangle','ring'];
  const legTypes= ['none','none','cross','fork','pins'];
  return {
    body:       bodies[((h*7)>>>0) % bodies.length],
    bodyColor:  pi(1), bodyColor2: pi(2),
    stemLength: 14 + Math.round(fr(3) * 18),
    stemColor:  pi(4),
    headShape:  heads[((h*11)>>>0) % heads.length],
    headColor:  pi(5),
    numHeads:   fr(6) < 0.65 ? 1 : fr(7) < 0.70 ? 2 : 3,
    legs:       legTypes[((h*13)>>>0) % legTypes.length],
    legColor:   pi(6),
    tailType:   fr(8) < 0.55 ? 'dots' : 'none',
    tailLength: 2 + Math.round(fr(9) * 6),
    tailColor:  pi(7),
    scale:      0.75 + fr(10) * 0.55,
    wobbleSpeed:0.04 + fr(11) * 0.07,
  };
}

const VIEW = {
  canvas:null, ctx2d:null, animFrame:null,
  pulses:{}, secondary:{}, pos:{}, tgt:{}, t:0,
  creatureProf:{}, creatureAngle:{}, wobble:{}, age:{}, tailHist:{},
};

function isoP(gx, gz, ox, oy, tw, th) {
  return { sx: ox+(gx-gz)*tw*0.5, sy: oy+(gx+gz)*th*0.5 };
}

function tileGeom(cw, ch) {
  const tw = Math.min(Math.floor(cw/5), 52);
  const th = Math.round(tw*0.56);
  return { tw, th, ox:cw*0.5, oy:ch*0.5-(GRID_N*th)*0.5 };
}

function updatePositions() {
  WORLDS[S.world].agents.forEach(a => {
    const home=AGENT_POS[S.world][a.id]; if (!home) return;
    if (!VIEW.pos[a.id]) { VIEW.pos[a.id]={gx:home.gx,gz:home.gz}; VIEW.tgt[a.id]={gx:home.gx,gz:home.gz}; }
    const mob=MOBILE[a.id]; if (!mob) return;
    const pos=VIEW.pos[a.id], tgt=VIEW.tgt[a.id];
    const dx=tgt.gx-pos.gx, dz=tgt.gz-pos.gz, dist=Math.sqrt(dx*dx+dz*dz);
    if (dist<0.06) {
      const angle=Math.random()*Math.PI*2, r=Math.random()*mob.wander;
      VIEW.tgt[a.id]={ gx:home.gx+Math.cos(angle)*r, gz:home.gz+Math.sin(angle)*r };
    } else { pos.gx+=(dx/dist)*mob.speed; pos.gz+=(dz/dist)*mob.speed; }
    // Update creature angle from movement direction in iso screen space
    const dvx = (tgt.gx - pos.gx) * 1 - (tgt.gz - pos.gz) * 1;
    const dvy = (tgt.gx - pos.gx) * 0.56 + (tgt.gz - pos.gz) * 0.56;
    if (Math.abs(dvx) > 0.001 || Math.abs(dvy) > 0.001) {
      const targetAngle = Math.atan2(dvx, -dvy);
      const cur = VIEW.creatureAngle[a.id] || 0;
      let delta = targetAngle - cur;
      while (delta > Math.PI)  delta -= Math.PI * 2;
      while (delta < -Math.PI) delta += Math.PI * 2;
      VIEW.creatureAngle[a.id] = cur + delta * 0.06;
    }
    // Wobble and age
    VIEW.age[a.id] = (VIEW.age[a.id] || 0) + 1;
    const prof = VIEW.creatureProf[a.id];
    if (prof) VIEW.wobble[a.id] = Math.sin(VIEW.age[a.id] * prof.wobbleSpeed) * 3;
  });
}

function drawIsoGrid(c, geom, isForest, isCity) {
  const { tw, th, ox, oy } = geom; const N=GRID_N;
  const top=isoP(0,0,ox,oy,tw,th), right=isoP(N,0,ox,oy,tw,th);
  const bot=isoP(N,N,ox,oy,tw,th), left =isoP(0,N,ox,oy,tw,th);

  c.beginPath();
  c.moveTo(top.sx,top.sy); c.lineTo(right.sx,right.sy);
  c.lineTo(bot.sx,bot.sy); c.lineTo(left.sx,left.sy);
  c.closePath();
  c.fillStyle = isForest ? 'rgba(8,12,6,0.68)' : isCity ? 'rgba(14,13,10,0.65)' : 'rgba(14,14,10,0.60)';
  c.fill();

  c.strokeStyle = isForest ? 'rgba(50,65,35,0.38)' : isCity ? 'rgba(90,82,68,0.42)' : 'rgba(88,88,74,0.48)';
  c.lineWidth=0.6;
  for (let i=0;i<=N;i++) {
    const a=isoP(i,0,ox,oy,tw,th),b=isoP(i,N,ox,oy,tw,th);
    c.beginPath(); c.moveTo(a.sx,a.sy); c.lineTo(b.sx,b.sy); c.stroke();
    const d=isoP(0,i,ox,oy,tw,th),e=isoP(N,i,ox,oy,tw,th);
    c.beginPath(); c.moveTo(d.sx,d.sy); c.lineTo(e.sx,e.sy); c.stroke();
  }

  c.strokeStyle = isForest ? 'rgba(65,85,45,0.65)' : isCity ? 'rgba(112,102,84,0.72)' : 'rgba(108,108,90,0.75)';
  c.lineWidth=1;
  c.beginPath();
  c.moveTo(top.sx,top.sy); c.lineTo(right.sx,right.sy);
  c.lineTo(bot.sx,bot.sy); c.lineTo(left.sx,left.sy);
  c.closePath(); c.stroke();
}

function drawEnvWater(c, geom) {
  const { tw, th, ox, oy }=geom;
  ENV_WATER_RIPPLES.forEach(r => {
    const {sx,sy}=isoP(r.gx,r.gz,ox,oy,tw,th);
    const prog=((VIEW.t*0.5+r.phase)%1.0);
    const radius=prog*tw*0.85, alpha=(1-prog)*0.45;
    c.beginPath(); c.ellipse(sx,sy,Math.max(0.5,radius),Math.max(0.5,radius*0.32),0,0,Math.PI*2);
    c.strokeStyle=`rgba(95,95,82,${alpha})`; c.lineWidth=0.6; c.stroke();
  });
}

function drawEnvCity(c, geom) {
  const { tw, th, ox, oy }=geom;
  ENV_CITY_BLOCKS.forEach(b => {
    const htPx = b.h * th * 1.5;
    const tl=isoP(b.gx,       b.gz,       ox,oy,tw,th);
    const tr=isoP(b.gx+b.w,   b.gz,       ox,oy,tw,th);
    const br=isoP(b.gx+b.w,   b.gz+b.d,   ox,oy,tw,th);
    const bl=isoP(b.gx,       b.gz+b.d,   ox,oy,tw,th);
    c.lineWidth=0.7;
    // left face
    c.beginPath();
    c.moveTo(tl.sx,tl.sy-htPx); c.lineTo(bl.sx,bl.sy-htPx);
    c.lineTo(bl.sx,bl.sy);       c.lineTo(tl.sx,tl.sy);
    c.closePath();
    c.fillStyle='rgba(22,20,16,0.50)'; c.fill();
    c.strokeStyle='rgba(105,98,82,0.52)'; c.stroke();
    // right face
    c.beginPath();
    c.moveTo(tr.sx,tr.sy-htPx); c.lineTo(br.sx,br.sy-htPx);
    c.lineTo(br.sx,br.sy);       c.lineTo(tr.sx,tr.sy);
    c.closePath();
    c.fillStyle='rgba(18,16,12,0.45)'; c.fill();
    c.strokeStyle='rgba(90,84,70,0.45)'; c.stroke();
    // top face
    c.beginPath();
    c.moveTo(tl.sx,tl.sy-htPx); c.lineTo(tr.sx,tr.sy-htPx);
    c.lineTo(br.sx,br.sy-htPx); c.lineTo(bl.sx,bl.sy-htPx);
    c.closePath();
    c.fillStyle='rgba(30,28,22,0.55)'; c.fill();
    c.strokeStyle='rgba(115,108,90,0.58)'; c.stroke();
  });
}

function drawEnvForest(c, geom) {
  const { tw, th, ox, oy }=geom;
  ENV_FOREST_TREES.forEach(t => {
    const {sx,sy}=isoP(t.gx,t.gz,ox,oy,tw,th);
    const r=t.r*tw*0.32;
    const sway=Math.sin(VIEW.t*0.38+t.gx*1.3)*0.05;
    // trunk
    c.beginPath();
    c.moveTo(sx, sy);
    c.lineTo(sx, sy-r*0.9);
    c.strokeStyle='rgba(60,50,32,0.42)'; c.lineWidth=0.8; c.stroke();
    // canopy
    c.beginPath();
    c.ellipse(sx, sy-r*0.85, r*0.88, r*0.34, 0, 0, Math.PI*2);
    c.fillStyle=`rgba(48,60,34,${0.28+sway})`;
    c.fill();
    c.strokeStyle='rgba(65,80,45,0.32)'; c.lineWidth=0.5; c.stroke();
  });
}

function drawCreatureAt(c2d, agentId, sx, sy, tw, pulsed, involved, warm) {
  const prof = VIEW.creatureProf[agentId]; if (!prof) return;
  const wobble = VIEW.wobble[agentId] || 0;
  const baseAlpha = pulsed ? 0.95 : involved ? 0.72 : warm ? 0.52 : 0.28;
  const sc = tw * 0.024 * prof.scale;

  // tail dots
  const hist = VIEW.tailHist[agentId] || [];
  if (prof.tailType === 'dots') {
    const SPACING = 3;
    for (let i = 0; i < prof.tailLength; i++) {
      const idx = i * SPACING;
      if (idx >= hist.length) break;
      const pt = hist[idx];
      const ta = baseAlpha * (1 - i / prof.tailLength) * 0.65;
      c2d.beginPath(); c2d.arc(pt.sx, pt.sy, sc * 3.5, 0, Math.PI * 2);
      c2d.fillStyle = hexAlpha(prof.tailColor, ta); c2d.fill();
    }
  }

  // update tail history
  const tailArr = VIEW.tailHist[agentId] || [];
  tailArr.unshift({ sx, sy });
  const maxH = (prof.tailLength * 3) + 10;
  if (tailArr.length > maxH) tailArr.length = maxH;
  VIEW.tailHist[agentId] = tailArr;

  c2d.save();
  c2d.translate(sx, sy);
  c2d.rotate(VIEW.creatureAngle[agentId] || 0);
  c2d.scale(sc, sc);

  const sl = prof.stemLength;

  // legs
  if (prof.legs !== 'none') {
    c2d.strokeStyle = hexAlpha(prof.legColor, baseAlpha * 0.65);
    c2d.lineWidth = 1.5;
    if (prof.legs === 'cross') {
      c2d.beginPath(); c2d.moveTo(-18, 8); c2d.lineTo(18, 8); c2d.stroke();
      c2d.beginPath(); c2d.moveTo(0, 0);   c2d.lineTo(0, 22); c2d.stroke();
    } else if (prof.legs === 'fork') {
      c2d.beginPath(); c2d.moveTo(-8, 0); c2d.lineTo(-16, 22); c2d.stroke();
      c2d.beginPath(); c2d.moveTo( 8, 0); c2d.lineTo( 16, 22); c2d.stroke();
    } else if (prof.legs === 'pins') {
      c2d.beginPath(); c2d.moveTo(0,0); c2d.lineTo(-12,20); c2d.stroke();
      c2d.beginPath(); c2d.moveTo(0,0); c2d.lineTo(  0,22); c2d.stroke();
      c2d.beginPath(); c2d.moveTo(0,0); c2d.lineTo( 12,20); c2d.stroke();
    }
  }

  // body
  c2d.lineWidth = 1.5;
  if (prof.body === 'square') {
    c2d.strokeStyle = hexAlpha(prof.bodyColor, baseAlpha);
    c2d.strokeRect(-10, -10, 20, 20);
  } else if (prof.body === 'circle') {
    c2d.beginPath(); c2d.arc(0, 0, 12, 0, Math.PI*2);
    c2d.strokeStyle = hexAlpha(prof.bodyColor, baseAlpha); c2d.stroke();
  } else if (prof.body === 'hexagon') {
    c2d.beginPath();
    for (let i=0;i<6;i++){const a=Math.PI/180*(60*i-30);i===0?c2d.moveTo(16*Math.cos(a),4+16*Math.sin(a)):c2d.lineTo(16*Math.cos(a),4+16*Math.sin(a));}
    c2d.closePath(); c2d.strokeStyle=hexAlpha(prof.bodyColor,baseAlpha); c2d.stroke();
  } else if (prof.body === 'pentagon') {
    c2d.beginPath();
    for (let i=0;i<5;i++){const a=Math.PI/180*(72*i-90);i===0?c2d.moveTo(16*Math.cos(a),4+16*Math.sin(a)):c2d.lineTo(16*Math.cos(a),4+16*Math.sin(a));}
    c2d.closePath(); c2d.strokeStyle=hexAlpha(prof.bodyColor,baseAlpha); c2d.stroke();
  } else if (prof.body === 'doubleRing') {
    c2d.beginPath(); c2d.arc(0,6,14,0,Math.PI*2); c2d.strokeStyle=hexAlpha(prof.bodyColor,baseAlpha); c2d.stroke();
    c2d.beginPath(); c2d.arc(0,6, 8,0,Math.PI*2); c2d.strokeStyle=hexAlpha(prof.bodyColor2,baseAlpha*0.7); c2d.stroke();
  }

  // stem + head(s)
  c2d.strokeStyle = hexAlpha(prof.stemColor, baseAlpha * 0.8);
  c2d.lineWidth = 1.5;
  c2d.beginPath(); c2d.moveTo(0, 0); c2d.lineTo(0, -sl); c2d.stroke();

  const drawHead = (hx, hy) => {
    const w2 = wobble * 0.3;
    c2d.fillStyle = hexAlpha(prof.headColor, baseAlpha);
    c2d.strokeStyle = hexAlpha(prof.headColor, baseAlpha);
    c2d.lineWidth = 1.5;
    if (prof.headShape === 'circle') {
      c2d.beginPath(); c2d.arc(hx, hy, 5 + w2, 0, Math.PI*2); c2d.fill();
    } else if (prof.headShape === 'square') {
      c2d.fillRect(hx-5, hy-5, 10, 10);
    } else if (prof.headShape === 'triangle') {
      c2d.beginPath(); c2d.moveTo(hx,hy-6); c2d.lineTo(hx+5.4,hy+3.6); c2d.lineTo(hx-5.4,hy+3.6); c2d.closePath(); c2d.fill();
    } else if (prof.headShape === 'ring') {
      c2d.beginPath(); c2d.arc(hx, hy, 5, 0, Math.PI*2); c2d.stroke();
    }
  };

  if (prof.numHeads === 1) {
    drawHead(0, -sl - 6);
  } else {
    const spread = (prof.numHeads - 1) * 9;
    for (let i = 0; i < prof.numHeads; i++) {
      const hx = -spread + i * (spread * 2 / (prof.numHeads - 1));
      c2d.strokeStyle = hexAlpha(prof.stemColor, baseAlpha * 0.8);
      c2d.lineWidth = 1.5;
      c2d.beginPath(); c2d.moveTo(0, -sl); c2d.lineTo(hx, -sl - 12); c2d.stroke();
      drawHead(hx, -sl - 18);
    }
  }

  // pulse glow ring when active
  if (pulsed) {
    c2d.beginPath(); c2d.arc(0, -sl/2, 28, 0, Math.PI*2);
    c2d.strokeStyle = hexAlpha(prof.headColor, 0.25); c2d.lineWidth = 2; c2d.stroke();
  }

  c2d.restore();
}

function drawViz() {
  const canvas=VIEW.canvas, c=VIEW.ctx2d;
  if (!canvas||!c) return;
  const cw=canvas.clientWidth, ch=canvas.clientHeight;
  c.fillStyle='#0a0a08'; c.fillRect(0,0,cw,ch); VIEW.t+=0.016;
  updatePositions();
  const geom=tileGeom(cw,ch);
  const isForest=false, isCity=false;

  const now=Date.now();
  WORLDS[S.world].agents.forEach(a => {
    const home=AGENT_POS[S.world][a.id]; if (!home) return;
    const curPos=VIEW.pos[a.id]||home;
    const {sx,sy}=isoP(curPos.gx,curPos.gz,geom.ox,geom.oy,geom.tw,geom.th);
    const age    =now-(VIEW.pulses[a.id]||0);
    const secAge =now-(VIEW.secondary[a.id]||0);
    const pulsed  =age<2800;
    const involved=!pulsed&&secAge<3200;
    const warm    =age<8000||secAge<5000;

    // pulse ring (keep from original)
    if (pulsed) {
      const t=age/2800, r=(geom.tw*0.13)+t*geom.tw*0.55;
      c.beginPath(); c.ellipse(sx,sy,Math.max(0.5,r),Math.max(0.5,r*0.38),0,0,Math.PI*2);
      c.strokeStyle=isForest?`rgba(140,190,100,${(1-t)*0.45})`:isCity?`rgba(220,190,130,${(1-t)*0.45})`:`rgba(196,196,170,${(1-t)*0.45})`;
      c.lineWidth=0.8; c.stroke();
    }

    drawCreatureAt(c, a.id, sx, sy, geom.tw, pulsed, involved, warm);
  });
}

function startViz() {
  const canvas=document.getElementById('world-canvas');
  VIEW.canvas=canvas; VIEW.ctx2d=canvas.getContext('2d');
  function resize(){
    const wrap=canvas.parentElement;
    const W=wrap.offsetWidth,H=wrap.offsetHeight,dpr=devicePixelRatio||1;
    canvas.width=W*dpr; canvas.height=H*dpr;
    canvas.style.width=W+'px'; canvas.style.height=H+'px';
    VIEW.ctx2d.setTransform(dpr,0,0,dpr,0,0);
  }
  resize(); VIEW._onResize=resize; window.addEventListener('resize',VIEW._onResize);
  function loop(){ drawViz(); VIEW.animFrame=requestAnimationFrame(loop); }
  loop();
}

function stopViz() {
  if (VIEW.animFrame) cancelAnimationFrame(VIEW.animFrame);
  VIEW.animFrame=null;
  if (VIEW._onResize){ window.removeEventListener('resize',VIEW._onResize); VIEW._onResize=null; }
  if (VIEW.ctx2d&&VIEW.canvas) VIEW.ctx2d.clearRect(0,0,VIEW.canvas.clientWidth,VIEW.canvas.clientHeight);
  VIEW.canvas=null; VIEW.ctx2d=null;
}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ecosystem</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; background:#07070f; overflow:hidden; color:#fff; font-family:'Courier New',monospace; }
body { display:flex; flex-direction:column; }

#world { flex:1; position:relative; min-height:0; }
canvas { display:block; width:100%; height:100%; }

#hud { position:absolute; inset:0; pointer-events:none; }

#phase-tag {
  position:absolute; top:20px; left:50%; transform:translateX(-50%);
  font-size:9px; letter-spacing:0.3em; text-transform:uppercase;
  color:rgba(255,255,255,0.2);
}
#act-bar {
  position:absolute; top:38px; left:50%; transform:translateX(-50%);
  width:90px; height:1px; background:rgba(255,255,255,0.07);
}
#act-fill { height:100%; width:0%; background:rgba(255,255,255,0.28); transition:width 3.5s cubic-bezier(0.4,0,0.2,1); }

#log {
  position:absolute; bottom:10px; left:18px;
  font-size:9px; color:rgba(255,255,255,0.18); line-height:2.1; pointer-events:none;
}

#bar {
  flex-shrink:0; height:50px;
  display:flex; align-items:center; gap:18px; padding:0 18px;
  background:#07070f; border-top:1px solid rgba(255,255,255,0.06);
}
.c { display:flex; align-items:center; gap:7px; font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(255,255,255,0.35); }
input[type=range] { width:70px; accent-color:rgba(255,255,255,0.4); cursor:pointer; }
button {
  background:transparent; border:1px solid rgba(255,255,255,0.14); color:rgba(255,255,255,0.5);
  font:9px/1 'Courier New',monospace; letter-spacing:0.14em; text-transform:uppercase;
  padding:5px 14px; cursor:pointer;
}
button:hover { border-color:rgba(255,255,255,0.35); color:rgba(255,255,255,0.85); }
button.on { background:rgba(255,255,255,0.07); border-color:rgba(255,255,255,0.38); color:#fff; }
#info { margin-left:auto; font-size:9px; color:rgba(255,255,255,0.18); letter-spacing:0.05em; }
</style>
</head>
<body>

<div id="world">
  <canvas id="c"></canvas>
  <div id="hud">
    <div id="phase-tag">—</div>
    <div id="act-bar"><div id="act-fill"></div></div>
    <div id="log"></div>
  </div>
</div>

<div id="bar">
  <button id="btnPlay">play</button>
  <div class="c">
    <label>bpm</label>
    <input type="range" id="slBpm" min="30" max="200" value="72">
    <span id="vBpm">72</span>
  </div>
  <div class="c">
    <label>field</label>
    <input type="range" id="slField" min="20" max="160" value="72">
    <span id="vField">72</span>
  </div>
  <button id="btnMidi">midi</button>
  <div id="info">—</div>
</div>

<script>
'use strict';

// ── canvas ─────────────────────────────────────────────────────────────────
const cv  = document.getElementById('c');
const ctx = cv.getContext('2d');
const worldEl = document.getElementById('world');

function resize() {
  cv.width  = worldEl.clientWidth;
  cv.height = worldEl.clientHeight;
}
resize();
new ResizeObserver(resize).observe(worldEl);

function WR() { return Math.min(cv.width, cv.height) / 2 * 0.78; }
function CX() { return cv.width  / 2; }
function CY() { return cv.height / 2; }

// ── arc phases (the director script) ──────────────────────────────────────
// Each arc has: name, duration range (seconds), target activity (0-1),
// count = how many agents enter scene (by PRIORITY order).
const ARCS = [
  { name:'stillness',   minD:40, maxD:72,  act:0.10, count:2 },
  { name:'stirring',    minD:22, maxD:42,  act:0.28, count:3 },
  { name:'gathering',   minD:20, maxD:38,  act:0.56, count:5 },
  { name:'convergence', minD:16, maxD:30,  act:0.82, count:7 },
  { name:'peak',        minD:12, maxD:24,  act:1.00, count:7 },
  { name:'dispersal',   minD:22, maxD:40,  act:0.36, count:4 },
];

// activation priority: root always first, spark always last
const PRIORITY = ['root','tide','pulse','step','wing','voice','spark'];

// ── agent definitions ──────────────────────────────────────────────────────
// spd   = pixels/second at ACTIVITY=1, BPM=72
// wRate = wander angle drift per second (radians) — higher = more erratic
// affinity: positive = attracted, negative = repelled
const DEFS = [
  { id:'root',  name:'Root',  col:'#c4a882', note:36, vel:100, dur:500,
    spd:40,  wRate:1.0,  affinity:{ tide:0.40, pulse:0.18 } },
  { id:'tide',  name:'Tide',  col:'#7fc4c4', note:43, vel:88,  dur:700,
    spd:58,  wRate:0.55, affinity:{ root:0.22 } },
  { id:'pulse', name:'Pulse', col:'#84c4a2', note:38, vel:90,  dur:130,
    spd:86,  wRate:1.7,  affinity:{} },
  { id:'step',  name:'Step',  col:'#c4c484', note:42, vel:80,  dur:55,
    spd:118, wRate:4.0,  affinity:{ spark:0.28 } },
  { id:'wing',  name:'Wing',  col:'#84a4c4', note:46, vel:70,  dur:85,
    spd:138, wRate:1.4,  affinity:{ voice:-0.24 } },
  { id:'voice', name:'Voice', col:'#c884a8', note:49, vel:115, dur:900,
    spd:20,  wRate:0.40, affinity:{ root:0.50, tide:0.35 } },
  { id:'spark', name:'Spark', col:'#e8c060', note:64, vel:95,  dur:28,
    spd:205, wRate:5.5,  affinity:{ wing:0.20, step:0.18 } },
];

// ── runtime state ──────────────────────────────────────────────────────────
let running     = false;
let bpm         = 72;
let fieldDist   = 72;
let ACTIVITY    = 0.08;
let tgtActivity = 0.08;
let arcIdx      = 0;
let arcDur      = 55;
let arcElapsed  = 0;
let rafId       = null;
let lastMs      = 0;
let midiOut     = null;
let midiOn      = false;
let encounters  = 0;

const ripples   = [];
const cooldowns = {};   // pairKey → lastFireMs
const logLines  = [];
const MAX_LOG   = 5;

// ── build agent objects ────────────────────────────────────────────────────
const agents = DEFS.map(d => ({
  ...d,
  x: 0, y: 0, vx: 0, vy: 0,
  wAngle: Math.random() * Math.PI * 2,
  opacity: 0, active: false, exiting: false,
}));

function byId(id) { return agents.find(a => a.id === id); }

// ── arc director ───────────────────────────────────────────────────────────
function enterArc(i) {
  arcIdx     = i % ARCS.length;
  const arc  = ARCS[arcIdx];
  arcDur     = arc.minD + Math.random() * (arc.maxD - arc.minD);
  arcElapsed = 0;
  tgtActivity = arc.act;

  const wanted = PRIORITY.slice(0, arc.count);
  agents.forEach(a => {
    if ( wanted.includes(a.id) && !a.active)              spawnAgent(a);
    if (!wanted.includes(a.id) &&  a.active && !a.exiting) retireAgent(a);
  });

  document.getElementById('phase-tag').textContent = arc.name;
  document.getElementById('act-fill').style.width  = (arc.act * 100) + '%';
}

function tickArc(dt) {
  arcElapsed += dt;
  if (arcElapsed >= arcDur) enterArc(arcIdx + 1);
}

function spawnAgent(a) {
  a.active = true; a.exiting = false;
  const ang = Math.random() * Math.PI * 2;
  const r   = WR() * 0.72;
  a.x = CX() + Math.cos(ang) * r;
  a.y = CY() + Math.sin(ang) * r;
  a.vx = 0; a.vy = 0;
  // initial heading roughly toward center
  a.wAngle = Math.atan2(CY() - a.y, CX() - a.x) + (Math.random() - 0.5) * 1.2;
}

function retireAgent(a) { a.exiting = true; }

// ── physics ────────────────────────────────────────────────────────────────
function updateAgents(dt) {
  const cx = CX(), cy = CY(), wr = WR();
  const spdScale = bpm / 72;

  for (const a of agents) {
    // fade opacity
    if (a.active && !a.exiting) {
      a.opacity = Math.min(1, a.opacity + dt * 1.4);
    } else {
      a.opacity = Math.max(0, a.opacity - dt * 0.8);
      if (a.opacity <= 0 && a.exiting) { a.active = false; a.exiting = false; }
    }
    if (a.opacity < 0.01) continue;

    // wander: drift heading angle
    a.wAngle += (Math.random() - 0.5) * a.wRate * dt;

    const targetSpd = a.spd * ACTIVITY * spdScale;

    // desired velocity from wander direction
    let dvx = Math.cos(a.wAngle) * targetSpd;
    let dvy = Math.sin(a.wAngle) * targetSpd;

    // affinity forces — pull/push toward other agents
    for (const [oid, str] of Object.entries(a.affinity)) {
      const b = byId(oid);
      if (!b || b.opacity < 0.15) continue;
      const dx = b.x - a.x, dy = b.y - a.y;
      const d  = Math.hypot(dx, dy) || 1;
      // force grows with distance up to ~180px, creates loose orbital pull
      const mag = str * targetSpd * 0.45 * Math.min(1, d / 180);
      dvx += (dx / d) * mag;
      dvy += (dy / d) * mag;
    }

    // soft boundary repulsion
    const bx = a.x - cx, by = a.y - cy;
    const bd = Math.hypot(bx, by) || 1;
    const margin = wr - 28;
    if (bd > margin) {
      const excess = (bd - margin) / 28;
      dvx -= (bx / bd) * excess * targetSpd * 2.2;
      dvy -= (by / bd) * excess * targetSpd * 2.2;
    }

    // exiting agents drift outward
    if (a.exiting) {
      dvx += (bx / bd) * targetSpd * 1.0;
      dvy += (by / bd) * targetSpd * 1.0;
    }

    // smooth velocity toward target
    const lr = Math.min(0.85, dt * 4.0);
    a.vx += (dvx - a.vx) * lr;
    a.vy += (dvy - a.vy) * lr;

    a.x += a.vx * dt;
    a.y += a.vy * dt;
  }
}

// ── collision / encounter ──────────────────────────────────────────────────
function checkCollisions() {
  const now  = Date.now();
  const vis  = agents.filter(a => a.active && !a.exiting && a.opacity > 0.5);
  // cooldown is longer when calm — events are rarer during stillness
  const cdMs = 2200 + (1 - ACTIVITY) * 4000;

  for (let i = 0; i < vis.length; i++) {
    for (let j = i + 1; j < vis.length; j++) {
      const a = vis[i], b = vis[j];
      const key = a.id < b.id ? `${a.id}:${b.id}` : `${b.id}:${a.id}`;
      if (now - (cooldowns[key] || 0) < cdMs) continue;

      const dx = b.x - a.x, dy = b.y - a.y;
      const d  = Math.hypot(dx, dy);
      if (d < fieldDist) {
        cooldowns[key] = now;
        fireEncounter(a, b, d);
      }
    }
  }
}

function fireEncounter(a, b, dist) {
  encounters++;
  const prox = 1 - dist / fieldDist;
  const mx   = (a.x + b.x) / 2;
  const my   = (a.y + b.y) / 2;

  // ripple ring at meeting point
  ripples.push({
    x: mx, y: my,
    r0: 12, r1: fieldDist * 1.5,
    born: Date.now(),
    life: 900 + prox * 800,
    str:  0.45 + prox * 0.55,
  });

  // MIDI: both notes as a dyad, velocity scaled by closeness
  const vel = Math.min(127, Math.round((a.vel + b.vel) / 2 * (0.55 + prox * 0.45)));
  midiNote(a.note, vel,               a.dur);
  midiNote(b.note, Math.round(vel * 0.76), b.dur);

  addLog(`${a.name.toLowerCase()} × ${b.name.toLowerCase()}`);
  document.getElementById('info').textContent =
    `${encounters} encounter${encounters !== 1 ? 's' : ''}`;
}

// ── midi ───────────────────────────────────────────────────────────────────
function midiNote(note, vel, dur) {
  if (!midiOn || !midiOut) return;
  const t = performance.now();
  midiOut.send([0x90, note, vel], t);
  midiOut.send([0x80, note, 0],   t + dur);
}

async function initMidi() {
  if (!navigator.requestMIDIAccess) {
    document.getElementById('btnMidi').textContent = 'no api'; return;
  }
  try {
    const acc  = await navigator.requestMIDIAccess();
    const outs = [...acc.outputs.values()];
    if (!outs.length) { document.getElementById('btnMidi').textContent = 'no output'; return; }
    midiOut = outs[0];
    midiOn  = true;
    document.getElementById('btnMidi').textContent = midiOut.name.slice(0, 16);
    document.getElementById('btnMidi').classList.add('on');
  } catch(e) {
    document.getElementById('btnMidi').textContent = 'blocked';
  }
}

// ── event log ──────────────────────────────────────────────────────────────
function addLog(msg) {
  logLines.unshift(msg);
  if (logLines.length > MAX_LOG) logLines.pop();
  document.getElementById('log').innerHTML = logLines.join('<br>');
}

// ── activity smooth ────────────────────────────────────────────────────────
function smoothActivity(dt) {
  ACTIVITY += (tgtActivity - ACTIVITY) * Math.min(1, dt * 0.9);
}

// ── render ─────────────────────────────────────────────────────────────────
function render() {
  const W = cv.width, H = cv.height;
  const cx = CX(), cy = CY(), wr = WR();
  const now = Date.now();

  // fade trail — shorter during peak (busier = more ephemeral)
  ctx.fillStyle = `rgba(7,7,15,${0.18 + (1 - ACTIVITY) * 0.10})`;
  ctx.fillRect(0, 0, W, H);

  // world boundary circle
  ctx.beginPath();
  ctx.arc(cx, cy, wr, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(255,255,255,${0.04 + ACTIVITY * 0.07})`;
  ctx.lineWidth = 1;
  ctx.stroke();

  // proximity field lines between nearby agents
  const vis = agents.filter(a => a.opacity > 0.05);
  for (let i = 0; i < vis.length; i++) {
    for (let j = i + 1; j < vis.length; j++) {
      const a = vis[i], b = vis[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const d  = Math.hypot(dx, dy);
      const maxD = fieldDist * 2.6;
      if (d > maxD) continue;
      const t = 1 - d / maxD;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = `rgba(255,255,255,${t * t * 0.14 * Math.min(a.opacity, b.opacity)})`;
      ctx.lineWidth = 0.6;
      ctx.stroke();
    }
  }

  // ripple rings (expand and fade)
  for (let i = ripples.length - 1; i >= 0; i--) {
    const r   = ripples[i];
    const age = (now - r.born) / r.life;
    if (age >= 1) { ripples.splice(i, 1); continue; }
    const ease = 1 - Math.pow(1 - age, 2);
    const rad  = r.r0 + (r.r1 - r.r0) * ease;
    const alpha = (1 - age) * r.str * 0.5;
    ctx.beginPath();
    ctx.arc(r.x, r.y, rad, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
    ctx.lineWidth = Math.max(0.3, 1.6 * (1 - ease));
    ctx.stroke();
  }

  // agents
  for (const a of agents) {
    if (a.opacity < 0.01) continue;

    // outer glow
    ctx.save();
    ctx.globalAlpha = a.opacity * 0.20;
    const g = ctx.createRadialGradient(a.x, a.y, 0, a.x, a.y, 38);
    g.addColorStop(0, a.col); g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(a.x, a.y, 38, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    // core
    ctx.save();
    ctx.globalAlpha = a.opacity;
    ctx.shadowBlur  = 16;
    ctx.shadowColor = a.col;
    ctx.fillStyle   = a.col;
    ctx.beginPath(); ctx.arc(a.x, a.y, 13, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    // name label
    ctx.save();
    ctx.globalAlpha = a.opacity * 0.42;
    ctx.fillStyle   = '#fff';
    ctx.font        = '9px "Courier New"';
    ctx.textAlign   = 'center';
    ctx.fillText(a.name.toLowerCase(), a.x, a.y + 25);
    ctx.restore();
  }
}

// ── main loop ──────────────────────────────────────────────────────────────
function loop(ms) {
  const dt = Math.min((ms - lastMs) / 1000, 0.1);
  lastMs = ms;
  smoothActivity(dt);
  tickArc(dt);
  updateAgents(dt);
  checkCollisions();
  render();
  rafId = requestAnimationFrame(loop);
}

// ── controls ───────────────────────────────────────────────────────────────
document.getElementById('btnPlay').addEventListener('click', () => {
  if (running) {
    running = false;
    cancelAnimationFrame(rafId); rafId = null;
    agents.forEach(a => { if (a.active) retireAgent(a); });
    document.getElementById('btnPlay').textContent = 'play';
    document.getElementById('btnPlay').classList.remove('on');
  } else {
    running = true; encounters = 0;
    ACTIVITY = 0.08; tgtActivity = 0.08;
    lastMs = performance.now();
    enterArc(0);
    rafId = requestAnimationFrame(loop);
    document.getElementById('btnPlay').textContent = 'stop';
    document.getElementById('btnPlay').classList.add('on');
  }
});

document.getElementById('slBpm').addEventListener('input', function() {
  bpm = +this.value;
  document.getElementById('vBpm').textContent = bpm;
});

document.getElementById('slField').addEventListener('input', function() {
  fieldDist = +this.value;
  document.getElementById('vField').textContent = fieldDist;
});

document.getElementById('btnMidi').addEventListener('click', initMidi);
</script>
</body>
</html>

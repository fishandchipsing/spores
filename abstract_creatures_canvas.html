<style>
#canvas{display:block;background:#2a2a2a;border-radius:12px;cursor:pointer;}
#controls{display:flex;gap:8px;padding:10px 0 0;flex-wrap:wrap;align-items:center;}
button{background:transparent;border:0.5px solid var(--color-border-secondary);color:var(--color-text-primary);padding:6px 14px;border-radius:var(--border-radius-md);cursor:pointer;font-size:13px;}
button:hover{background:var(--color-background-secondary);}
#count{font-size:12px;color:var(--color-text-secondary);padding:6px 0 0;}
</style>

<canvas id="canvas" width="680" height="480"></canvas>
<div id="controls">
  <button onclick="spawnCreature()">+ Spawn creature</button>
  <button onclick="spawnMany()">+ Spawn 5</button>
  <button onclick="clearAll()">Clear</button>
</div>
<div id="count">0 creatures wandering</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const creatures = [];

const TAIL_DOT_SPACING = 7;
const MAX_SPEED = 0.9;

const COLORS = ['#00e5ff','#ff4db8','#ffe156','#c8f542','#7c6ef5','#f542c2','#5bc8f5','#ff5252','#f0f0f0'];

function rnd(a,b){return a+Math.random()*(b-a);}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function rndColor(){return pick(COLORS);}

function pickHeadShape(){
  const r = Math.random();
  if(r < 0.65) return 'circle';
  if(r < 0.80) return 'square';
  if(r < 0.90) return 'triangle';
  return 'ring';
}

function makeCreature(){
  const x=rnd(80,600), y=rnd(80,400);
  const speed=rnd(0.25,0.7);
  const angle=Math.random()*Math.PI*2;
  const c1=rndColor(), c2=rndColor(), c3=rndColor();
  const scale=rnd(0.7,1.3);

  const numHeads=pick([1,1,1,2,3]);
  const headShape = pickHeadShape();
  const headColor = pick([c1,c2,c3]);
  const heads=[];
  for(let i=0;i<numHeads;i++) heads.push({shape: headShape, color: headColor});

  const stemLength = rnd(18, 38);

  const tailType=pick(['dots','dots','dots','none','none']);
  const tailLength=tailType==='dots'?pick([2,3,4,5,6,8,10,14,18]):0;

  return {
    x, y, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed,
    angle, turnSpeed:rnd(-0.015,0.015), scale,
    body:pick(['square','square','circle','hexagon','pentagon','doubleRing','none']),
    bodyColor:c1, bodyColor2:c2,
    stemLength,
    stemColor: pick([c1,c2]),
    heads, headShape,
    tailType, tailLength, tailColor:c3,
    legs:pick(['none','none','cross','fork','pins']), legColor:pick([c1,c2,c3]),
    wobble:0, wobbleSpeed:rnd(0.05,0.12), age:0,
    history:[],
  };
}

function spawnCreature(){creatures.push(makeCreature());updateCount();}
function spawnMany(){for(let i=0;i<5;i++)creatures.push(makeCreature());updateCount();}
function clearAll(){creatures.length=0;updateCount();}
function updateCount(){document.getElementById('count').textContent=creatures.length+' creature'+(creatures.length!==1?'s':'')+' wandering';}

function drawCircle(x,y,r,color,filled){
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  if(filled){ctx.fillStyle=color;ctx.fill();}
  else{ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();}
}
function drawSquare(x,y,s,color,filled){
  if(filled){ctx.fillStyle=color;ctx.fillRect(x-s/2,y-s/2,s,s);}
  else{ctx.strokeStyle=color;ctx.lineWidth=2;ctx.strokeRect(x-s/2,y-s/2,s,s);}
}
function drawTriangle(x,y,s,color,filled){
  ctx.beginPath();ctx.moveTo(x,y-s);ctx.lineTo(x+s*0.9,y+s*0.6);ctx.lineTo(x-s*0.9,y+s*0.6);ctx.closePath();
  if(filled){ctx.fillStyle=color;ctx.fill();}else{ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();}
}
function drawHexagon(x,y,r,color){
  ctx.beginPath();
  for(let i=0;i<6;i++){const a=Math.PI/180*(60*i-30);i===0?ctx.moveTo(x+r*Math.cos(a),y+r*Math.sin(a)):ctx.lineTo(x+r*Math.cos(a),y+r*Math.sin(a));}
  ctx.closePath();ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();
}
function drawPentagon(x,y,r,color){
  ctx.beginPath();
  for(let i=0;i<5;i++){const a=Math.PI/180*(72*i-90);i===0?ctx.moveTo(x+r*Math.cos(a),y+r*Math.sin(a)):ctx.lineTo(x+r*Math.cos(a),y+r*Math.sin(a));}
  ctx.closePath();ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();
}

function drawHead(x, y, shape, color, wobble){
  if(shape==='circle') drawCircle(x, y, 5 + wobble*0.3, color, true);
  else if(shape==='square') drawSquare(x, y, 10, color, true);
  else if(shape==='triangle') drawTriangle(x, y-2, 6, color, true);
  else if(shape==='ring') drawCircle(x, y, 5, color, false);
}

function drawCreature(c){
  ctx.save();ctx.translate(c.x,c.y);
  const moveAngle = Math.atan2(c.vy, c.vx) + Math.PI/2;
  ctx.rotate(moveAngle);
  ctx.scale(c.scale, c.scale);

  const w = c.wobble;
  const sl = c.stemLength;

  if(c.legs==='cross'){
    ctx.strokeStyle=c.legColor;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-18,8);ctx.lineTo(18,8);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,22);ctx.stroke();
  }
  if(c.legs==='fork'){
    ctx.strokeStyle=c.legColor;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-8,0);ctx.lineTo(-16,22);ctx.stroke();
    ctx.beginPath();ctx.moveTo(8,0);ctx.lineTo(16,22);ctx.stroke();
  }
  if(c.legs==='pins'){
    ctx.strokeStyle=c.legColor;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-12,20);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,22);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(12,20);ctx.stroke();
  }

  if(c.body==='square'){ drawSquare(0,0,20,c.bodyColor); }
  else if(c.body==='circle'){ drawCircle(0,0,12,c.bodyColor); }
  else if(c.body==='hexagon'){ drawHexagon(0,4,16,c.bodyColor); }
  else if(c.body==='pentagon'){ drawPentagon(0,4,16,c.bodyColor); }
  else if(c.body==='doubleRing'){ drawCircle(0,6,14,c.bodyColor);drawCircle(0,6,8,c.bodyColor2); }

  const stemTop = -sl;

  if(c.heads.length === 1){
    ctx.strokeStyle = c.stemColor; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0, stemTop); ctx.stroke();
    drawHead(0, stemTop - 6, c.heads[0].shape, c.heads[0].color, w);
  } else {
    const spread = (c.heads.length - 1) * 9;
    ctx.strokeStyle = c.stemColor; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0, stemTop); ctx.stroke();
    c.heads.forEach((head, i)=>{
      const hx = -spread + i * (spread * 2 / (c.heads.length - 1));
      ctx.strokeStyle = c.stemColor; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(0, stemTop); ctx.lineTo(hx, stemTop - 12); ctx.stroke();
      drawHead(hx, stemTop - 18, head.shape, head.color, w);
    });
  }

  ctx.restore();
}

function drawTail(c){
  if(c.tailType!=='dots'||c.tailLength===0) return;
  const hist=c.history;
  if(hist.length<2) return;
  for(let i=0;i<c.tailLength;i++){
    const idx=i*TAIL_DOT_SPACING;
    if(idx>=hist.length) break;
    const pt=hist[idx];
    ctx.beginPath();ctx.arc(pt.x,pt.y,3,0,Math.PI*2);
    ctx.fillStyle=c.tailColor;ctx.fill();
  }
}

function update(){
  const W=canvas.width,H=canvas.height;
  creatures.forEach(c=>{
    c.history.unshift({x:c.x,y:c.y});
    const maxHist=c.tailLength*TAIL_DOT_SPACING+10;
    if(c.history.length>maxHist) c.history.length=maxHist;
    c.wobble=Math.sin(c.age*c.wobbleSpeed)*3; c.age++;
    c.vx+=Math.cos(c.angle)*0.015+rnd(-0.03,0.03);
    c.vy+=Math.sin(c.angle)*0.015+rnd(-0.03,0.03);
    c.angle+=c.turnSpeed+rnd(-0.008,0.008);
    const spd=Math.sqrt(c.vx*c.vx+c.vy*c.vy);
    if(spd>MAX_SPEED){c.vx*=MAX_SPEED/spd;c.vy*=MAX_SPEED/spd;}
    c.x+=c.vx;c.y+=c.vy;
    if(c.x<30)c.vx+=0.2;if(c.x>W-30)c.vx-=0.2;
    if(c.y<30)c.vy+=0.2;if(c.y>H-30)c.vy-=0.2;
  });
}

function render(){
  ctx.fillStyle='#2a2a2a';ctx.fillRect(0,0,canvas.width,canvas.height);
  creatures.forEach(c=>{drawTail(c);drawCreature(c);});
  update();requestAnimationFrame(render);
}

canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect(),sc=canvas.width/r.width;
  const c=makeCreature();c.x=(e.clientX-r.left)*sc;c.y=(e.clientY-r.top)*sc;
  creatures.push(c);updateCount();
});

for(let i=0;i<6;i++) creatures.push(makeCreature());
updateCount();render();
</script>

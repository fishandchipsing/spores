<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ambient walk</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#0a0a08; --dim:#1a1a16; --muted:#38382f; --text:#7a7a6e; --accent:#c4c4aa; --event:#e4e4cc; }
  html, body { height:100%; background:var(--bg); color:var(--text); font-family:'IBM Plex Mono',monospace; font-weight:300; font-size:13px; line-height:1.7; overflow:hidden; user-select:none; }
  body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:999; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E"); }
  #canvas { display:block; position:fixed; inset:0; }
  #ui { position:fixed; inset:0; pointer-events:none; z-index:10; padding:36px 44px; display:flex; flex-direction:column; justify-content:space-between; }
  #top-bar { display:flex; justify-content:space-between; align-items:flex-start; pointer-events:auto; }
  #world-selector { display:flex; gap:28px; }
  .world-btn { background:none; border:none; color:var(--muted); font-family:inherit; font-size:10px; font-weight:300; letter-spacing:0.14em; text-transform:uppercase; cursor:pointer; padding:0; transition:color 0.5s; position:relative; }
  .world-btn::after { content:''; position:absolute; bottom:-2px; left:0; width:0; height:1px; background:var(--accent); transition:width 0.4s; }
  .world-btn.active { color:var(--accent); } .world-btn.active::after { width:100%; } .world-btn:hover { color:var(--text); }
  #status { text-align:right; font-size:10px; color:var(--muted); letter-spacing:0.05em; line-height:1.9; }
  #status .hl { color:var(--text); }
  #bottom-bar { text-align:center; pointer-events:none; }
  #event-display { display:inline-block; text-align:center; opacity:0; transition:opacity 0.8s; }
  #event-display.visible { opacity:1; }
  #ev-agent { font-size:9px; letter-spacing:0.16em; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
  #ev-desc { font-size:12px; color:var(--event); font-style:italic; letter-spacing:0.03em; max-width:460px; line-height:1.9; }
  #speed-wrap { position:fixed; bottom:36px; left:44px; z-index:10; font-size:9px; color:var(--muted); letter-spacing:0.10em; text-transform:uppercase; display:flex; align-items:center; gap:12px; }
  #speed-slider { -webkit-appearance:none; width:80px; height:1px; background:var(--muted); outline:none; cursor:pointer; }
  #speed-slider::-webkit-slider-thumb { -webkit-appearance:none; width:8px; height:8px; border-radius:50%; background:var(--text); cursor:pointer; }
  #modal { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:100; }
  #modal.hidden { display:none; }
  #modal-inner { width:340px; }
  #modal h2 { font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--accent); margin-bottom:36px; font-weight:300; }
  .field { margin-bottom:20px; }
  .field label { display:block; font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  .field input { width:100%; background:none; border:none; border-bottom:1px solid var(--dim); color:var(--text); font-family:inherit; font-size:12px; padding:6px 0; outline:none; transition:border-color 0.3s; }
  .field input:focus { border-color:var(--muted); }
  #modal-start { margin-top:36px; background:none; border:1px solid var(--muted); color:var(--text); font-family:inherit; font-size:9px; letter-spacing:0.16em; text-transform:uppercase; padding:10px 28px; cursor:pointer; transition:all 0.3s; width:100%; }
  #modal-start:hover { border-color:var(--accent); color:var(--accent); }
  #debug-overlay { position:fixed; bottom:72px; left:44px; font-size:9px; letter-spacing:0.07em; z-index:10; line-height:2.0; pointer-events:none; }
  #debug-overlay .dk { color:var(--muted); opacity:0.45; display:inline-block; width:36px; }
  #debug-overlay .dv { color:var(--text); transition:opacity 1.2s; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui">
  <div id="top-bar">
    <div id="world-selector">
      <button class="world-btn active" data-world="water">water</button>
      <button class="world-btn" data-world="city">city</button>
      <button class="world-btn" data-world="space">space</button>
    </div>
    <div id="status">
      <span id="st-world" class="hl">water</span> &middot;
      <span id="st-weather">—</span> &middot;
      <span id="st-time">—</span>
    </div>
  </div>
  <div id="bottom-bar">
    <div id="event-display">
      <div id="ev-agent"></div>
      <div id="ev-desc"></div>
    </div>
  </div>
</div>

<div id="debug-overlay">
  <div><span class="dk">sfx</span><span class="dv" id="dbg-sfx">—</span></div>
  <div><span class="dk">tone</span><span class="dv" id="dbg-tone">—</span></div>
</div>
<div id="speed-wrap">
  slow <input type="range" id="speed-slider" min="4" max="40" value="14" step="1"> fast
  &nbsp;&nbsp;&nbsp;
  bpm <input type="range" id="bpm-slider" min="20" max="180" value="80" step="1" style="-webkit-appearance:none;width:70px;height:1px;background:var(--muted);outline:none;cursor:pointer"> <span id="bpm-val" style="min-width:24px;display:inline-block">80</span>
</div>

<div id="modal">
  <div id="modal-inner">
    <h2>ambient walk</h2>
    <button id="modal-start">begin walk</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// WORLDS
// ═══════════════════════════════════════════════════════════
const WORLDS = {
  water: {
    label:'water',
    weathers:['dead calm','light breeze','overcast','light rain','dusk mist'],
    times:['pre-dawn','early morning','morning','midday','dusk','night'],
    ambient:{ noiseColor:'brown', rumble:{freq:60,gain:0.05}, shimmer:{freq:900,q:0.5,gain:0.018}, lfo:{rate:0.08,depth:0.25} },
    palette:{ sky1:'#0c1318', sky2:'#0f1c22', ground1:'#0d1d1e', ground2:'#081214', line:'rgba(60,90,80,0.35)' },
    agents:[
      { id:'heron',         label:'heron',          desc:'motionless for long periods, then sudden strike — betrayed by slow wingbeat as it lifts', cooldown:22000 },
      { id:'otter',         label:'otter',          desc:'fast playful movement through water, brief surfacing, diving, paws on the bank', cooldown:16000 },
      { id:'swan',          label:'swan',           desc:'slow heavy wing displacement as it passes, territorial hiss if too close, water displacement', cooldown:20000 },
      { id:'kingfisher',    label:'kingfisher',     desc:'rapid low flight over water, hover, plunge — brief and vivid, then gone upstream', cooldown:18000 },
      { id:'frogs',         label:'frogs',          desc:'collective chorus — density shifts as you approach, individual calls surface and sink back', cooldown:12000 },
      { id:'reed_warblers', label:'reed warblers',  desc:'intense rattling song from deep in the reeds — invisible, close, shifts as you pass', cooldown:14000 },
      { id:'moorhen',       label:'moorhen',        desc:'abrupt alarm call and water splash — nervous, retreats into reeds, then slow return', cooldown:15000 },
      { id:'ducks',         label:'ducks',          desc:'casual surface feeding, soft murmuring quack, periodic wing stretch and spray', cooldown:14000 },
      { id:'fish',          label:'fish',           desc:'surface break — a ring of water, gone before it fully registers', cooldown:11000 },
      { id:'bat',           label:'bat',            desc:'ultrasonic hunting at dusk — passes close, barely perceptible except for wing membrane', cooldown:19000 },
      { id:'willows',       label:'willows',        desc:'trailing branches touching water as wind passes — slow, heavy whisper from the bank', cooldown:25000 },
      { id:'wind',          label:'wind',           desc:'moves across open water — surface hiss, bend of reeds, then stillness restores', cooldown:24000 },
      { id:'woodpigeon',    label:'woodpigeon',     desc:'low coo from the far treeline — measured, distant, occupying its own slow rhythm', cooldown:20000 },
    ],
    systemPrompt:`You are a sound engine for an immersive first-person walk through a wetland. The listener has just come close to this entity. Generate an intimate, immediate sound moment — as if you've just walked past it.`,
  },

  city: {
    label:'city',
    weathers:['clear','overcast','light rain','windy','fog'],
    times:['early morning','rush hour','midday','afternoon','evening rush','night'],
    ambient:{ noiseColor:'pink', rumble:{freq:75,gain:0.09}, shimmer:{freq:280,q:1.2,gain:0.012}, lfo:{rate:0.022,depth:0.04} },
    palette:{ sky1:'#0d0c0a', sky2:'#141210', ground1:'#111008', ground2:'#0a0908', line:'rgba(100,90,65,0.30)' },
    agents:[
      { id:'pedestrian',    label:'pedestrian',     desc:'foot traffic — heels on pavement, shopping bags, fragment of conversation as they pass', cooldown:11000 },
      { id:'cyclist',       label:'cyclist',        desc:'wheels on tarmac, bell ringing, gear shift — fast pass very close, then gone', cooldown:13000 },
      { id:'car',           label:'car',            desc:'engine idle at lights, acceleration, door slam — close pass or distant rumble', cooldown:12000 },
      { id:'tram',          label:'tram',           desc:'iron wheels on rail, electric hum, bell at stop, doors — slow and massive then sudden quiet', cooldown:20000 },
      { id:'pigeons',       label:'pigeons',        desc:'collective wing burst from pavement as you approach, cooing from ledge above', cooldown:14000 },
      { id:'busker',        label:'busker',         desc:'music bleeding from an underpass — grows as you approach, peaks as you pass, fades behind', cooldown:23000 },
      { id:'cafe',          label:'café',           desc:'espresso machine, chairs scraping, brief laughter, waft of coffee as you pass', cooldown:21000 },
      { id:'vendor',        label:'vendor',         desc:'newspaper call or market shout — repeating cadence, directed at you as you pass', cooldown:17000 },
      { id:'construction',  label:'construction',   desc:'pneumatic drill, scaffold clang, reversing beep — sudden loud proximity, abrupt pause', cooldown:24000 },
      { id:'argument',      label:'argument',       desc:'raised voices — sudden directional, footsteps retreating, then silence', cooldown:28000 },
      { id:'phone_call',    label:'phone call',     desc:'one-sided loud conversation while walking — pacing footsteps beside you, laugh, hang up', cooldown:16000 },
      { id:'delivery',      label:'delivery',       desc:'trolley wheels on kerb, hand truck clang, van idling, package dropped on step', cooldown:18000 },
    ],
    systemPrompt:`You are a sound engine for an immersive first-person walk through a city street. The listener has just come close to this entity. Generate an intimate, immediate moment — as if you've just walked past it.`,
  },

  space: {
    label:'space',
    weathers:['solar minimum','solar flare','ion storm','deep silence','geomagnetic storm'],
    times:['orbital night','transit','aphelion','perihelion','eclipse','deep field'],
    ambient:{ noiseColor:'pink', rumble:{freq:28,gain:0.05}, shimmer:{freq:3400,q:0.15,gain:0.016}, lfo:{rate:0.018,depth:0.28} },
    palette:{ sky1:'#06060c', sky2:'#080812', ground1:'#060610', ground2:'#040408', line:'rgba(50,50,90,0.20)' },
    agents:[
      { id:'pulsar',        label:'pulsar',         desc:'precise electromagnetic pulse on fixed interval — phase-drifts as you enter its signal cone', cooldown:17000 },
      { id:'satellite',     label:'satellite',      desc:'faint telemetry tone in low orbit — Doppler shift as it approaches and sweeps past', cooldown:20000 },
      { id:'meteorite',     label:'meteorite',      desc:'high-pitched streak becoming entry rumble — very brief, very close, then nothing', cooldown:26000 },
      { id:'asteroid',      label:'asteroid belt',  desc:'distant grinding and slow displacement — rock on rock collision resonance', cooldown:22000 },
      { id:'ion_cloud',     label:'ion cloud',      desc:'electromagnetic interference — signals fragment as you drift through, then clear', cooldown:20000 },
      { id:'planet',        label:'planet',         desc:'magnetosphere oscillation — massive sub-bass cycle felt more than heard', cooldown:28000 },
      { id:'ring_system',   label:'ring system',    desc:'crystalline hiss of ice particles in orbit — fine structure audible as you pass through', cooldown:25000 },
      { id:'solar_wind',    label:'solar wind',     desc:'sibilant rush of charged particles — varies with solar activity, surges or thins', cooldown:19000 },
      { id:'nebula',        label:'nebula',         desc:'drift through ionised dust — low staticky rustle, gradual and vast, signals scatter', cooldown:26000 },
      { id:'comet',         label:'comet tail',     desc:'sublimating ice vapor — faint high-frequency hiss sweeping in direction of travel', cooldown:22000 },
      { id:'probe',         label:'deep probe',     desc:'ancient transmission from beyond the heliosphere — data burst, then silence across light-years', cooldown:30000 },
    ],
    systemPrompt:`You are a sound engine for immersive drift through deep space. The listener is a sensor array and has just entered signal range of an entity. Generate an intimate electromagnetic moment. No terrestrial metaphors.`,
  },
};

// ═══════════════════════════════════════════════════════════
// CONSTANTS & STATE
// ═══════════════════════════════════════════════════════════
const STRIP_W    = 2600;  // world width in px (loops)
const TRIGGER_D  = 88;    // px from CX to trigger
let   scrollX    = 0;     // how far scrolled (world units = px)
let   scrollSpeed = 14;   // px per second

const S = { world:'water', running:false, bpm:80, weather:'', timeOfDay:'' };
const AGENTS = {};

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
function initAgents(world) {
  const agents = WORLDS[world].agents;
  const n = agents.length;
  const sector = STRIP_W / n;
  agents.forEach((a, i) => {
    // Spread evenly with jitter, start offset so first agent isn't right at center
    const base = sector * i + sector * 0.3 + Math.random() * sector * 0.5;
    AGENTS[a.id] = {
      worldX: base % STRIP_W,
      vy: (Math.random() - 0.5) * 90,  // vertical offset from horizon
      lastFired: -99999,
      firing: false, fireT: 0,
      state: 'present',
    };
  });
}

function initWorld(world) {
  S.world = world;
  const w = WORLDS[world];
  S.weather   = w.weathers[Math.floor(Math.random()*w.weathers.length)];
  S.timeOfDay = w.times[Math.floor(Math.random()*w.times.length)];
  document.getElementById('st-world').textContent   = world;
  document.getElementById('st-weather').textContent = S.weather;
  document.getElementById('st-time').textContent    = S.timeOfDay;
  document.querySelectorAll('.world-btn').forEach(b=>b.classList.toggle('active',b.dataset.world===world));
  scrollX = 0;
  initAgents(world);
}

// ═══════════════════════════════════════════════════════════
// SCREEN POSITION
// ═══════════════════════════════════════════════════════════
function agentSX(worldX) {
  let rel = ((worldX - scrollX) % STRIP_W + STRIP_W) % STRIP_W;
  if (rel > STRIP_W / 2) rel -= STRIP_W;
  return CX + rel;
}

// ═══════════════════════════════════════════════════════════
// WEB AUDIO
// ═══════════════════════════════════════════════════════════
let actx, masterGain, ambGain, ns1, ns2, lfo1, lfo2;

function buildNoise(type) {
  const len=actx.sampleRate*4; const buf=actx.createBuffer(1,len,actx.sampleRate); const d=buf.getChannelData(0);
  if(type==='brown'){ let l=0; for(let i=0;i<len;i++){const w=Math.random()*2-1;d[i]=(l+0.02*w)/1.02;l=d[i];d[i]*=3.5;} }
  else { let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0; for(let i=0;i<len;i++){const w=Math.random()*2-1;b0=0.99886*b0+w*0.0555179;b1=0.99332*b1+w*0.0750759;b2=0.96900*b2+w*0.1538520;b3=0.86650*b3+w*0.3104856;b4=0.55000*b4+w*0.5329522;b5=-0.7616*b5-w*0.0168980;d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11;b6=w*0.115926;} }
  const src=actx.createBufferSource(); src.buffer=buf; src.loop=true; return src;
}

function startAmbient(world) {
  if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended') actx.resume();
  stopAmbient();
  const p=WORLDS[world].ambient;
  masterGain=actx.createGain(); masterGain.gain.value=0.6; masterGain.connect(actx.destination);
  ambGain=actx.createGain(); ambGain.gain.value=0; ambGain.connect(masterGain);
  ns1=buildNoise(p.noiseColor);
  const ls1=actx.createBiquadFilter(); ls1.type='lowshelf'; ls1.frequency.value=p.rumble.freq; ls1.gain.value=14;
  const nf1=actx.createBiquadFilter(); nf1.type='bandpass'; nf1.frequency.value=p.shimmer.freq; nf1.Q.value=p.shimmer.q;
  ns1.connect(ls1); ls1.connect(nf1); nf1.connect(ambGain);
  lfo1=actx.createOscillator(); lfo1.type='sine'; lfo1.frequency.value=p.lfo.rate;
  const lg1=actx.createGain(); lg1.gain.value=p.lfo.depth; lfo1.connect(lg1); lg1.connect(ambGain.gain);
  ns2=buildNoise(p.noiseColor);
  const ls2=actx.createBiquadFilter(); ls2.type='lowshelf'; ls2.frequency.value=p.rumble.freq*0.7; ls2.gain.value=10;
  const nf2=actx.createBiquadFilter(); nf2.type='bandpass'; nf2.frequency.value=p.shimmer.freq*1.85; nf2.Q.value=p.shimmer.q*1.6;
  const lg2=actx.createGain(); lg2.gain.value=0;
  ns2.connect(ls2); ls2.connect(nf2); nf2.connect(lg2); lg2.connect(ambGain);
  lfo2=actx.createOscillator(); lfo2.type='sine'; lfo2.frequency.value=p.lfo.rate*1.618;
  const lf2=actx.createGain(); lf2.gain.value=p.lfo.depth*0.65; lfo2.connect(lf2); lf2.connect(lg2.gain);
  ns1.start(); ns2.start(); lfo1.start(); lfo2.start();
  ambGain.gain.setTargetAtTime(0.52,actx.currentTime,2.5);
  lg2.gain.setTargetAtTime(0.30,actx.currentTime,3.5);
}

function stopAmbient() {
  [ns1,ns2,lfo1,lfo2].forEach(n=>{try{n&&n.stop();}catch(e){}});
  ns1=ns2=lfo1=lfo2=null;
  if(ambGain){ambGain.disconnect();ambGain=null;}
}

async function playSFX(prompt, pan, vol=1.0) {
  if(!actx) return;
  debugLine('sfx', prompt.slice(0,38));
  try {
    const res=await fetch('/sfx',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:prompt,duration_seconds:4,prompt_influence:0.5,world:S.world})});
    if(!res.ok) return;
    const buf=await actx.decodeAudioData(await res.arrayBuffer());
    const src=actx.createBufferSource(); src.buffer=buf;
    const lp=actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=2600; lp.Q.value=0.5;
    const pn=actx.createStereoPanner(); pn.pan.value=Math.max(-1,Math.min(1,pan));
    const g=actx.createGain(); g.gain.value=0.60*vol;
    src.connect(lp); lp.connect(pn); pn.connect(g); g.connect(masterGain||actx.destination); src.start();
  } catch(e){console.warn('SFX:',e);}
}

// ═══════════════════════════════════════════════════════════
// DEBUG
// ═══════════════════════════════════════════════════════════
const DBG = { timers:{} };
function debugLine(key, val) {
  const el = document.getElementById('dbg-'+key); if (!el) return;
  el.textContent = val; el.style.opacity = '1';
  clearTimeout(DBG.timers[key]);
  DBG.timers[key] = setTimeout(() => { el.style.opacity = '0.25'; }, 7000);
}

// ═══════════════════════════════════════════════════════════
// MELODIC TONE LAYER
// ═══════════════════════════════════════════════════════════
const MELODY_CFG = {
  water: { freqs:[261.63,293.66,329.63,392.00,440.00,523.25,587.33,659.26,783.99,880.00],
           wave:'sine',    vol:0.075, atk:0.6, hold:0.25, rel:2.8, beatMult:0.5 },
  city:  { freqs:[110.00,123.47,130.81,146.83,164.81,174.61,196.00,220.00,246.94,261.63],
           wave:'triangle',vol:0.060, atk:0.3, hold:0.20, rel:1.8, beatMult:0.25 },
  space: { freqs:[32.70,36.71,41.20,48.99,55.00,65.41,82.41,110.00],
           wave:'sine',    vol:0.085, atk:2.5, hold:1.20, rel:5.5, beatMult:2.0 },
};
let melodyTimer = null;
const beatMs = () => 60000 / S.bpm;

const VIBE = { activity: 0.3, tension: 0.2, register: 0.5 };
const VIBE_TIME = {
  'late night':0.15,'night':0.20,'early morning':0.30,'dawn':0.40,
  'morning':0.65,'midday':0.82,'afternoon':0.70,'dusk':0.45,'evening':0.35,
};
function updateVibe() {
  // activity drifts toward scroll speed (4–40 → 0.2–0.9)
  const speedTarget = 0.2 + (scrollSpeed - 4) / 36 * 0.7;
  VIBE.activity += (speedTarget - VIBE.activity) * 0.12;
  // tension nudges randomly per event
  VIBE.tension += (0.2 + Math.random() * 0.5 - VIBE.tension) * 0.25;
  const tod = (S.timeOfDay||'').toLowerCase();
  for (const [k,v] of Object.entries(VIBE_TIME)) {
    if (tod.includes(k)) { VIBE.register += (v - VIBE.register) * 0.15; break; }
  }
}

function playNote(world, freq) {
  if (!actx || !masterGain) return;
  const m = MELODY_CFG[world];
  const osc = actx.createOscillator();
  const env = actx.createGain();
  const lp  = actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=freq*5;
  osc.type=m.wave; osc.frequency.value=freq; env.gain.value=0;
  osc.connect(lp); lp.connect(env); env.connect(masterGain);
  const t=actx.currentTime, dur=m.atk+m.hold+m.rel;
  env.gain.linearRampToValueAtTime(0,t);
  env.gain.linearRampToValueAtTime(m.vol,t+m.atk);
  env.gain.setValueAtTime(m.vol,t+m.atk+m.hold);
  env.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  osc.start(t); osc.stop(t+dur+0.1);
}

function playPhrase(world) {
  const m = MELODY_CFG[world]; if (!m||!actx||!masterGain||!S.running) return;
  const len = 2 + Math.round(VIBE.activity * 3);
  const fl = m.freqs.length;
  const center = Math.round(VIBE.register * (fl-1));
  let idx = Math.max(0, Math.min(fl-1, center + Math.floor((Math.random()-0.5)*4)));
  const notes = [];
  for (let i=0; i<len; i++) {
    notes.push(m.freqs[Math.max(0,Math.min(fl-1,idx))]);
    const maxStep = VIBE.tension>0.6 ? 1 : VIBE.tension>0.3 ? 2 : 3;
    const dir = Math.random()<0.5?1:-1;
    idx = Math.max(0,Math.min(fl-1, idx + dir*(1+Math.floor(Math.random()*maxStep))));
  }
  const spacing = beatMs() * m.beatMult * (1.2 - VIBE.activity*0.8);
  notes.forEach((freq,i) => {
    setTimeout(()=>{ if(!S.running)return; playNote(world,freq); }, i*spacing);
  });
  debugLine('tone', notes.map(f=>Math.round(f)+'Hz').join(' → '));
  const phraseDur = (len-1)*spacing + (m.atk+m.hold+m.rel)*1000;
  melodyTimer = setTimeout(()=>{ if(S.running) playPhrase(S.world); }, phraseDur + beatMs());
}

function startMelody(world) {
  stopMelody();
  const m = MELODY_CFG[world]; if (!m) return;
  melodyTimer = setTimeout(()=>{ if(S.running) playPhrase(world); }, beatMs()*2);
}

function stopMelody() { clearTimeout(melodyTimer); melodyTimer = null; }

function playSounds(sounds, pan) {
  if(!sounds||!sounds.length) return;
  sounds.forEach(s=>setTimeout(()=>playSFX(s.prompt,pan,s.vol??1.0).catch(()=>{}),s.delay??0));
}

// ═══════════════════════════════════════════════════════════
// CLAUDE
// ═══════════════════════════════════════════════════════════
async function fireMoment(agDef, screenX) {
  const ag=AGENTS[agDef.id]; if(!ag) return;
  ag.firing=true; ag.fireT=Date.now();

  // Pan from screen position: left edge = -0.85, right = +0.85
  const pan=((screenX-CX)/(CW/2))*0.85;

  try {
    const res=await fetch('/claude',{
      method:'POST',headers:{'content-type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:320,
        messages:[{role:'user',content:`${WORLDS[S.world].systemPrompt}

Environment: ${S.world}, ${S.weather}, ${S.timeOfDay}
Entity: ${agDef.label} — ${agDef.desc}
State: ${ag.state}

Return ONLY valid JSON (no markdown):
{
  "description": "one sentence — only what is heard in this encounter",
  "sounds": [
    { "prompt": "first sound, max 10 words",  "delay": 0,    "vol": 0.70 },
    { "prompt": "second sound, max 10 words", "delay": 1200, "vol": 0.42 },
    { "prompt": "third sound, max 10 words",  "delay": 2800, "vol": 0.28 }
  ],
  "agent_state": "updated state"
}

sounds: 1 required, 2 and 3 optional. Spread across 0–4 seconds. Nothing sharp or loud — layers heard through open space. First is the encounter (vol ~0.70), second is context or echo (vol ~0.40), third is distant residue (vol ~0.25).`}]
      })
    });
    if(!res.ok) return;
    const data=await res.json();
    const m=(data.content?.[0]?.text||'').match(/\{[\s\S]*?\}/);
    if(!m) return;
    const ev=JSON.parse(m[0]);
    if(ev.agent_state) ag.state=ev.agent_state;
    updateVibe();
    showEvent(agDef.label,ev.description);
    if(ev.sounds) playSounds(ev.sounds,pan);
    else if(ev.sound_prompt) playSFX(ev.sound_prompt,pan).catch(()=>{});
  } catch(e){console.warn('Claude:',e);}
}

// ═══════════════════════════════════════════════════════════
// EVENT DISPLAY
// ═══════════════════════════════════════════════════════════
let evTimer=null;
function showEvent(label,desc){
  const el=document.getElementById('event-display');
  document.getElementById('ev-agent').textContent=label;
  document.getElementById('ev-desc').textContent=desc;
  el.classList.add('visible');
  clearTimeout(evTimer);
  evTimer=setTimeout(()=>el.classList.remove('visible'),10000);
}

// ═══════════════════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════════════════
const canvas=document.getElementById('canvas');
const c=canvas.getContext('2d');
let dpr,CW,CH,CX,CY,HY; // HY = horizon y

function resize(){
  dpr=devicePixelRatio||1;
  CW=window.innerWidth; CH=window.innerHeight;
  canvas.width=CW*dpr; canvas.height=CH*dpr;
  canvas.style.width=CW+'px'; canvas.style.height=CH+'px';
  c.setTransform(dpr,0,0,dpr,0,0);
  CX=CW/2; CY=CH/2;
  HY=CH*0.58; // horizon line position
}
window.addEventListener('resize',resize);
resize();

// Environment decorations — scattered in the strip
const DECOR = (() => {
  let s=77391; const r=()=>{s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff;};
  const stars=Array.from({length:120},()=>({wx:r()*STRIP_W,vy:(r()-0.5)*CH*0.45,size:r()<0.1?1.5:r()<0.3?1.0:0.5,br:0.3+r()*0.7,phase:r()*Math.PI*2,twinkle:0.4+r()*1.2}));
  const reeds=Array.from({length:30},()=>({wx:r()*STRIP_W,h:18+r()*28,sway:r()*0.6}));
  const cityBlocks=Array.from({length:20},()=>({wx:r()*STRIP_W,w:40+r()*120,h:30+r()*100,offset:(r()-0.5)*20}));
  return {stars,reeds,cityBlocks};
})();

let T=0;

function drawFrame(now) {
  T=now*0.001;
  c.clearRect(0,0,CW,CH);

  const pal=WORLDS[S.world].palette;
  const isSpace=S.world==='space';

  // Sky gradient
  const sky=c.createLinearGradient(0,0,0,HY);
  sky.addColorStop(0,pal.sky1); sky.addColorStop(1,pal.sky2);
  c.fillStyle=sky; c.fillRect(0,0,CW,HY);

  // Ground gradient
  if(!isSpace){
    const gnd=c.createLinearGradient(0,HY,0,CH);
    gnd.addColorStop(0,pal.ground1); gnd.addColorStop(1,pal.ground2);
    c.fillStyle=gnd; c.fillRect(0,HY,CW,CH-HY);
  } else {
    // Space: dark below too
    c.fillStyle=pal.ground1; c.fillRect(0,HY,CW,CH-HY);
  }

  // Environment decorations
  if(isSpace) {
    DECOR.stars.forEach(st=>{
      const sx=agentSX(st.wx);
      if(sx<-20||sx>CW+20) return;
      const sy=CY+st.vy;
      const tw=Math.sin(T*st.twinkle+st.phase)*0.25+0.75;
      c.fillStyle=`rgba(200,205,225,${st.br*tw*0.65})`;
      c.fillRect(Math.round(sx),Math.round(sy),Math.ceil(st.size),Math.ceil(st.size));
    });
  }

  if(S.world==='water') {
    // Reed silhouettes at horizon
    DECOR.reeds.forEach(reed=>{
      const sx=agentSX(reed.wx);
      if(sx<-10||sx>CW+10) return;
      const sway=Math.sin(T*0.8+reed.sway*10)*1.5;
      c.strokeStyle='rgba(55,75,60,0.55)'; c.lineWidth=1.2;
      c.beginPath(); c.moveTo(sx,HY+2); c.lineTo(sx+sway,HY-reed.h); c.stroke();
      // Reed head
      c.fillStyle='rgba(55,70,55,0.45)';
      c.beginPath(); c.ellipse(sx+sway,HY-reed.h,2,5,0,0,Math.PI*2); c.fill();
    });
    // Water ripples in ground area
    const rippleT=(T*0.35)%1.0;
    for(let i=0;i<6;i++){
      const rwx=(scrollX*0.3+(i/6)*STRIP_W)%STRIP_W;
      const rsx=agentSX(rwx);
      if(rsx<-50||rsx>CW+50) continue;
      const prog=((T*0.4+i*0.18)%1.0);
      const rr=prog*(CW*0.06);
      c.beginPath(); c.ellipse(rsx,HY+20+i*8,Math.max(0.3,rr),Math.max(0.3,rr*0.28),0,0,Math.PI*2);
      c.strokeStyle=`rgba(55,85,75,${(1-prog)*0.22})`; c.lineWidth=0.5; c.stroke();
    }
  }

  if(S.world==='city') {
    // Building silhouettes
    DECOR.cityBlocks.forEach(b=>{
      const sx=agentSX(b.wx);
      if(sx<-200||sx>CW+200) return;
      c.fillStyle='rgba(14,12,9,0.85)';
      c.fillRect(sx+b.offset,HY-b.h,b.w,b.h);
      // Window grid suggestion
      c.strokeStyle='rgba(90,80,55,0.08)'; c.lineWidth=0.4;
      for(let wy=HY-b.h+8;wy<HY-5;wy+=10){
        c.beginPath(); c.moveTo(sx+b.offset,wy); c.lineTo(sx+b.offset+b.w,wy); c.stroke();
      }
    });
  }

  // Horizon line
  c.strokeStyle=pal.line; c.lineWidth=0.5;
  c.beginPath(); c.moveTo(0,HY); c.lineTo(CW,HY); c.stroke();

  // Trigger zone — very faint vertical band at center
  const tg=c.createLinearGradient(CX-TRIGGER_D,0,CX+TRIGGER_D,0);
  tg.addColorStop(0,'rgba(180,175,150,0)');
  tg.addColorStop(0.5,'rgba(180,175,150,0.025)');
  tg.addColorStop(1,'rgba(180,175,150,0)');
  c.fillStyle=tg; c.fillRect(CX-TRIGGER_D,0,TRIGGER_D*2,CH);

  // Agents
  const now=Date.now();
  const agents=WORLDS[S.world].agents;
  const isSpaceWorld=S.world==='space';

  agents.forEach(agDef=>{
    const ag=AGENTS[agDef.id]; if(!ag) return;
    const sx=agentSX(ag.worldX);
    if(sx<-60||sx>CW+60) return;

    const sy=isSpaceWorld?CY+ag.vy:HY+ag.vy;
    const distFromCenter=Math.abs(sx-CX);
    const proximity=Math.max(0,1-distFromCenter/(CW*0.38));

    // Approach glow — dot brightens as it nears center
    const dotR=2.8+proximity*3.2;
    const alpha=0.18+proximity*0.72;

    // Fire ring
    if(ag.firing){
      const ft=(now-ag.fireT)/3000;
      if(ft>=1){ag.firing=false;}
      else {
        const ringR=ft*80;
        c.beginPath(); c.arc(sx,sy,Math.max(0.3,ringR),0,Math.PI*2);
        c.strokeStyle=`rgba(196,196,170,${(1-ft)*0.50})`; c.lineWidth=0.8; c.stroke();
      }
    }

    // Dot color — per world
    const [r,g,b] = isSpaceWorld?[110,130,200]:S.world==='city'?[165,138,90]:[100,130,120];
    const onCooldown=(now-ag.lastFired)<agDef.cooldown*0.35;
    if(ag.firing)       c.fillStyle=`rgba(${r+60},${g+55},${b+40},0.95)`;
    else if(onCooldown) c.fillStyle=`rgba(${r*0.45|0},${g*0.45|0},${b*0.45|0},${alpha*0.4})`;
    else                c.fillStyle=`rgba(${r},${g},${b},${alpha})`;

    c.beginPath(); c.arc(sx,sy,dotR,0,Math.PI*2); c.fill();

    // Label — fades in as agent approaches
    if(proximity>0.15){
      c.fillStyle=`rgba(${r},${g},${b},${(proximity-0.15)/0.85*0.75})`;
      c.font='9px IBM Plex Mono,monospace'; c.textAlign='center';
      c.fillText(agDef.label,sx,sy-(dotR+7));
    }
  });

  // Center marker — "you"
  const youY=isSpace?CY:HY;
  // Subtle vertical line at center
  const yl=c.createLinearGradient(0,youY-30,0,youY+30);
  yl.addColorStop(0,'rgba(196,196,170,0)');
  yl.addColorStop(0.5,'rgba(196,196,170,0.20)');
  yl.addColorStop(1,'rgba(196,196,170,0)');
  c.strokeStyle=yl; c.lineWidth=0.6;
  c.beginPath(); c.moveTo(CX,youY-28); c.lineTo(CX,youY+28); c.stroke();
  // Tiny dot
  c.fillStyle='rgba(196,196,170,0.55)';
  c.beginPath(); c.arc(CX,youY,2.2,0,Math.PI*2); c.fill();
}

// ═══════════════════════════════════════════════════════════
// UPDATE
// ═══════════════════════════════════════════════════════════
let lastTime=0;

function update(now) {
  if(!S.running) return;
  const dt=Math.min(now-(lastTime||now),100);
  lastTime=now;

  scrollX+=scrollSpeed*(dt/1000);
  if(scrollX>=STRIP_W) scrollX-=STRIP_W;

  const nowMs=Date.now();
  WORLDS[S.world].agents.forEach(agDef=>{
    const ag=AGENTS[agDef.id]; if(!ag||ag.firing) return;
    const sx=agentSX(ag.worldX);
    const dist=Math.abs(sx-CX);
    if(dist<TRIGGER_D && nowMs-ag.lastFired>agDef.cooldown){
      ag.lastFired=nowMs;
      fireMoment(agDef,sx);
    }
  });
}

// ═══════════════════════════════════════════════════════════
// LOOP
// ═══════════════════════════════════════════════════════════
function loop(now){
  update(now);
  drawFrame(now);
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════════
document.getElementById('speed-slider').addEventListener('input',e=>{
  scrollSpeed=parseFloat(e.target.value);
});
document.getElementById('bpm-slider').addEventListener('input',e=>{
  S.bpm=parseInt(e.target.value); document.getElementById('bpm-val').textContent=S.bpm;
});

document.querySelectorAll('.world-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    if(!S.running) return;
    stopAmbient(); stopMelody();
    initWorld(btn.dataset.world);
    startAmbient(btn.dataset.world);
    startMelody(btn.dataset.world);
  });
});

// ═══════════════════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════════════════
document.getElementById('modal-start').addEventListener('click',()=>{
  document.getElementById('modal').classList.add('hidden');
  S.running=true;
  initWorld(S.world);
  startAmbient(S.world);
  startMelody(S.world);
});

initWorld('water');
requestAnimationFrame(loop);
</script>
